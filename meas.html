<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A1614">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>三相測定</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1A1614;
      --bg-2:       #141210;
      --surface:    #262220;
      --surface-2:  #302C2A;
      --border:     #3A3532;
      --text:       #F0EBE6;
      --text-sub:   #9E9691;
      --text-faint: #615D5A;
      --accent:     #C85C3A;
      --warning:    #B87828;
      --success:    #2A7A4E;
      --header-h:   44px;
      --numpad-h:   200px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== HEADER ===== */
    .header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 14px;
      z-index: 100;
    }
    .header-title { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; }
    .header-sub   { margin-left: 10px; font-size: 11px; color: var(--text-faint); }
    .header-reset {
      margin-left: auto;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-sub); font-size: 12px; font-weight: 700;
      padding: 6px 13px; border-radius: 8px;
      cursor: pointer; font-family: inherit;
    }
    .header-reset:active { opacity: 0.7; }

    /* ===== MAIN ===== */
    .main {
      margin-top: var(--header-h);
      padding: 14px 12px 24px;
      /* numpad が出てる間は底上げ */
      -webkit-transition: padding-bottom 0.28s ease;
      transition: padding-bottom 0.28s ease;
    }
    .main.pad-open { padding-bottom: calc(var(--numpad-h) + 24px); }

    /* ===== PHASE BLOCK ===== */
    .phase-block {
      margin-bottom: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .phase-hd { font-size: 13px; font-weight: 700; padding: 8px 12px; border-bottom: 2px solid currentColor; }
    .th-u { color: #ff9800; }
    .th-v { color: #69d469; }
    .th-w { color: #5bc8ff; }

    /* ===== TABLE ===== */
    .meas-tbl { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
    .meas-tbl th {
      padding: 6px 8px; text-align: left;
      color: var(--text-sub); font-weight: 600;
      border-bottom: 1px solid var(--border);
      background: var(--bg-2);
    }
    .meas-tbl td { padding: 5px 6px; text-align: center; border-bottom: 1px solid var(--border); }
    .meas-tbl tr:last-child td { border-bottom: none; }
    .col-lbl { text-align: left !important; color: var(--text-sub); font-size: 12px; white-space: nowrap; width: 14%; padding: 5px 4px !important; }

    /* ===== INPUT CELL ===== */
    .meas-td-wrap {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: stretch; align-items: stretch;
      border: 1px solid var(--border); border-radius: 6px;
      overflow: hidden; background: var(--surface-2);
    }
    .meas-td-wrap .meas-in { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; min-width: 0; border: none !important; background: transparent; border-radius: 0; }
    .meas-x {
      -webkit-flex-shrink: 0; flex-shrink: 0;
      background: none; border: none;
      border-left: 1px solid var(--border);
      color: var(--text-faint); font-size: 14px;
      cursor: pointer; padding: 4px 8px;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
    }
    .meas-x:active { color: #F87171; }

    .meas-in {
      width: 100%;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--surface-2); color: var(--text);
      font-size: 14px; padding: 6px 4px;
      text-align: right; font-family: inherit;
      -webkit-appearance: none; appearance: none;
      /* フォーカス枠 */
      outline: none;
      -webkit-transition: border-color 0.15s; transition: border-color 0.15s;
    }
    .meas-in.active-inp { border-color: var(--accent) !important; box-shadow: 0 0 0 2px rgba(200,92,58,0.25); }

    /* ===== DIFF CELL ===== */
    .meas-diff { font-weight: 700; font-size: 12px; line-height: 1.4; vertical-align: middle; padding: 6px 4px; }

    /* ===== COL HEADER ===== */
    .col-hd-wrap { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: space-between; justify-content: space-between; }
    .col-reset {
      background: none; border: 1px solid var(--border);
      border-radius: 4px; color: var(--text-faint);
      font-size: 10px; padding: 2px 6px;
      cursor: pointer; white-space: nowrap; font-family: inherit;
    }
    .col-reset:active { color: var(--text); }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      -webkit-transform: translateX(-50%) translateY(8px);
      transform: translateX(-50%) translateY(8px);
      background: var(--surface-2); color: var(--text);
      border: 1px solid var(--border);
      padding: 9px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      z-index: 999; white-space: nowrap;
      opacity: 0; pointer-events: none;
      -webkit-transition: opacity 0.25s, -webkit-transform 0.25s;
      transition: opacity 0.25s, transform 0.25s;
    }
    .toast.show { opacity: 1; -webkit-transform: translateX(-50%) translateY(0); transform: translateX(-50%) translateY(0); }

    /* ===== SUMMARY ===== */
    .summary { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 18px; }
    .summary-title { font-size: 11px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .summary-grid { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; gap: 6px; }
    .summary-cell { background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 6px; text-align: center; -webkit-box-flex: 1; -webkit-flex: 1 1 30%; flex: 1 1 30%; }
    .summary-cell-label { font-size: 10px; color: var(--text-faint); margin-bottom: 3px; }
    .summary-cell-val { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.3; }

    /* ===== NUMPAD ===== */
    .numpad-overlay {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 198;
    }
    .numpad-overlay.show { display: block; }

    .numpad {
      position: fixed; left: 0; right: 0; bottom: 0;
      height: var(--numpad-h);
      background: var(--surface);
      border-top: 2px solid var(--accent);
      z-index: 199;
      -webkit-transform: translateY(100%);
      transform: translateY(100%);
      -webkit-transition: -webkit-transform 0.28s ease;
      transition: transform 0.28s ease;
      padding: 8px 8px 12px;
    }
    .numpad.show {
      -webkit-transform: translateY(0);
      transform: translateY(0);
    }

    /* 対象表示バー */
    .numpad-target-bar {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      margin-bottom: 6px; gap: 8px;
    }
    .numpad-target-label {
      font-size: 11px; color: var(--text-faint); -webkit-flex: 1; flex: 1;
    }
    .numpad-target-val {
      font-size: 18px; font-weight: 700; color: var(--text);
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 8px; padding: 4px 12px; min-width: 100px; text-align: right;
    }
    .numpad-close {
      background: none; border: 1px solid var(--border);
      color: var(--text-sub); font-size: 13px; font-weight: 700;
      padding: 4px 12px; border-radius: 8px;
      cursor: pointer; font-family: inherit;
    }
    .numpad-close:active { background: var(--surface-2); }

    /* ボタングリッド: 0-9 + マイナス + BS */
    .numpad-grid {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
      gap: 5px;
    }
    .np-btn {
      -webkit-box-flex: 1; -webkit-flex: 1 1 17%; flex: 1 1 17%;
      min-width: 0;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text); font-size: 20px; font-weight: 600;
      border-radius: 9px; padding: 10px 4px;
      cursor: pointer; font-family: inherit;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      -webkit-transition: background 0.1s; transition: background 0.1s;
    }
    .np-btn:active { background: var(--border); }
    .np-btn-zero  { -webkit-box-flex: 2; -webkit-flex: 2 1 36%; flex: 2 1 36%; }
    .np-btn-minus { background: var(--bg-2); color: var(--text-sub); }
    .np-btn-bs    { background: var(--bg-2); color: #F87171; font-size: 16px; }
    .np-btn-ok    { background: var(--accent); color: #fff; border-color: var(--accent); }
  </style>
</head>
<body>

<header class="header">
  <span class="header-title">三相測定</span>
  <span class="header-sub">U / V / W</span>
  <button class="header-reset" onclick="resetAll()">全リセット</button>
</header>

<main class="main" id="mainArea">

  <!-- サマリー -->
  <div class="summary">
    <div class="summary-title">判定サマリー</div>
    <div class="summary-grid" id="summaryGrid"></div>
  </div>

  <!-- U相 -->
  <div class="phase-block">
    <div class="phase-hd th-u">U相</div>
    <table class="meas-tbl">
      <thead><tr>
        <th style="width:14%"></th>
        <th><div class="col-hd-wrap"><span class="th-u">R</span><button class="col-reset" onclick="clearCol('u','r')">リセット</button></div></th>
        <th><div class="col-hd-wrap"><span>A</span><button class="col-reset" onclick="clearCol('u','a')">リセット</button></div></th>
        <th><div class="col-hd-wrap"><span>B</span><button class="col-reset" onclick="clearCol('u','b')">リセット</button></div></th>
      </tr></thead>
      <tbody>
        <tr>
          <td class="col-lbl">ON</td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mu_on_r" type="text" readonly onfocus="openPad(this,'u')" onclick="openPad(this,'u')"><button class="meas-x" onclick="clearOne(this,'u')">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mu_on_a" type="text" readonly onfocus="openPad(this,'u')" onclick="openPad(this,'u')"><button class="meas-x" onclick="clearOne(this,'u')">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mu_on_b" type="text" readonly onfocus="openPad(this,'u')" onclick="openPad(this,'u')"><button class="meas-x" onclick="clearOne(this,'u')">×</button></div></td>
        </tr>
        <tr>
          <td class="col-lbl">OFF</td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mu_off_r" type="text" readonly onfocus="openPad(this,'u')" onclick="openPad(this,'u')"><button class="meas-x" onclick="clearOne(this,'u')">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mu_off_a" type="text" readonly onfocus="openPad(this,'u')" onclick="openPad(this,'u')"><button class="meas-x" onclick="clearOne(this,'u')">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mu_off_b" type="text" readonly onfocus="openPad(this,'u')" onclick="openPad(this,'u')"><button class="meas-x" onclick="clearOne(this,'u')">×</button></div></td>
        </tr>
        <tr>
          <td class="col-lbl">判定</td>
          <td class="meas-diff" id="mu_d_r">—</td>
          <td class="meas-diff" id="mu_d_a">—</td>
          <td class="meas-diff" id="mu_d_b">—</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- V相 -->
  <div class="phase-block">
    <div class="phase-hd th-v">V相</div>
    <table class="meas-tbl">
      <thead><tr>
        <th style="width:14%"></th>
        <th><div class="col-hd-wrap"><span class="th-v">R</span><button class="col-reset" onclick="clearCol('v','r')">リセット</button></div></th>
        <th><div class="col-hd-wrap"><span>A</span><button class="col-reset" onclick="clearCol('v','a')">リセット</button></div></th>
        <th><div class="col-hd-wrap"><span>B</span><button class="col-reset" onclick="clearCol('v','b')">リセット</button></div></th>
      </tr></thead>
      <tbody>
        <tr>
          <td class="col-lbl">ON</td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mv_on_r" type="text" readonly onfocus="openPad(this,'v')" onclick="openPad(this,'v')"><button class="meas-x" onclick="clearOne(this,'v')">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mv_on_a" type="text" readonly onfocus="openPad(this,'v')" onclick="openPad(this,'v')"><button class="meas-x" onclick="clearOne(this,'v')">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mv_on_b" type="text" readonly onfocus="openPad(this,'v')" onclick="openPad(this,'v')"><button class="meas-x" onclick="clearOne(this,'v')">×</button></div></td>
        </tr>
        <tr>
          <td class="col-lbl">OFF</td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mv_off_r" type="text" readonly onfocus="openPad(this,'v')" onclick="openPad(this,'v')"><button class="meas-x" onclick="clearOne(this,'v')">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mv_off_a" type="text" readonly onfocus="openPad(this,'v')" onclick="openPad(this,'v')"><button class="meas-x" onclick="clearOne(this,'v')">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mv_off_b" type="text" readonly onfocus="openPad(this,'v')" onclick="openPad(this,'v')"><button class="meas-x" onclick="clearOne(this,'v')">×</button></div></td>
        </tr>
        <tr>
          <td class="col-lbl">判定</td>
          <td class="meas-diff" id="mv_d_r">—</td>
          <td class="meas-diff" id="mv_d_a">—</td>
          <td class="meas-diff" id="mv_d_b">—</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- W相 -->
  <div class="phase-block">
    <div class="phase-hd th-w">W相</div>
    <table class="meas-tbl">
      <thead><tr>
        <th style="width:14%"></th>
        <th><div class="col-hd-wrap"><span class="th-w">R</span><button class="col-reset" onclick="clearCol('w','r')">リセット</button></div></th>
        <th><div class="col-hd-wrap"><span>A</span><button class="col-reset" onclick="clearCol('w','a')">リセット</button></div></th>
        <th><div class="col-hd-wrap"><span>B</span><button class="col-reset" onclick="clearCol('w','b')">リセット</button></div></th>
      </tr></thead>
      <tbody>
        <tr>
          <td class="col-lbl">ON</td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mw_on_r" type="text" readonly onfocus="openPad(this,'w')" onclick="openPad(this,'w')"><button class="meas-x" onclick="clearOne(this,'w')">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mw_on_a" type="text" readonly onfocus="openPad(this,'w')" onclick="openPad(this,'w')"><button class="meas-x" onclick="clearOne(this,'w')">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mw_on_b" type="text" readonly onfocus="openPad(this,'w')" onclick="openPad(this,'w')"><button class="meas-x" onclick="clearOne(this,'w')">×</button></div></td>
        </tr>
        <tr>
          <td class="col-lbl">OFF</td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mw_off_r" type="text" readonly onfocus="openPad(this,'w')" onclick="openPad(this,'w')"><button class="meas-x" onclick="clearOne(this,'w')">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mw_off_a" type="text" readonly onfocus="openPad(this,'w')" onclick="openPad(this,'w')"><button class="meas-x" onclick="clearOne(this,'w')">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mw_off_b" type="text" readonly onfocus="openPad(this,'w')" onclick="openPad(this,'w')"><button class="meas-x" onclick="clearOne(this,'w')">×</button></div></td>
        </tr>
        <tr>
          <td class="col-lbl">判定</td>
          <td class="meas-diff" id="mw_d_r">—</td>
          <td class="meas-diff" id="mw_d_a">—</td>
          <td class="meas-diff" id="mw_d_b">—</td>
        </tr>
      </tbody>
    </table>
  </div>

</main>

<!-- ===== 数字パッド ===== -->
<div class="numpad-overlay" id="padOverlay" onclick="closePad()"></div>
<div class="numpad" id="numpad">
  <div class="numpad-target-bar">
    <span class="numpad-target-label" id="padLabel">—</span>
    <span class="numpad-target-val"   id="padVal">—</span>
    <button class="numpad-close" onclick="closePad()">完了</button>
  </div>
  <div class="numpad-grid">
    <button class="np-btn" onclick="npInput('1')">1</button>
    <button class="np-btn" onclick="npInput('2')">2</button>
    <button class="np-btn" onclick="npInput('3')">3</button>
    <button class="np-btn" onclick="npInput('4')">4</button>
    <button class="np-btn" onclick="npInput('5')">5</button>
    <button class="np-btn" onclick="npInput('6')">6</button>
    <button class="np-btn" onclick="npInput('7')">7</button>
    <button class="np-btn" onclick="npInput('8')">8</button>
    <button class="np-btn" onclick="npInput('9')">9</button>
    <button class="np-btn np-btn-minus" onclick="npInput('-')">±</button>
    <button class="np-btn np-btn-zero" onclick="npInput('0')">0</button>
    <button class="np-btn np-btn-bs"   onclick="npInput('BS')">⌫</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var PHASES = ['u','v','w'];
var COLS   = ['r','a','b'];

// ===== 数字パッド =====
var _padTarget = null;  // 現在フォーカス中の input 要素
var _padPh     = '';    // 相（u/v/w）
var _padRaw    = '';    // 数字列（マイナス記号除く）
var _padNeg    = false; // マイナスフラグ

function openPad(inp, ph) {
  _padTarget = inp;
  _padPh     = ph;
  // 既存値から復元
  var cur = inp.value || '';
  _padNeg = (cur.charAt(0) === '-');
  _padRaw = cur.replace(/[^0-9]/g, '');

  // ラベル生成
  var id    = inp.id; // 例: mu_on_r
  var parts = id.split('_'); // ['mu','on','r'] or ['mw','off','b']
  var phMap = { u:'U相', v:'V相', w:'W相' };
  var rowLbl = parts[1] === 'on' ? 'ON' : 'OFF';
  var colLbl = parts[2].toUpperCase();
  document.getElementById('padLabel').textContent = phMap[ph] + ' - ' + rowLbl + ' - ' + colLbl;

  _refreshPadVal();
  _setActiveInp(inp);

  document.getElementById('padOverlay').className = 'numpad-overlay show';
  document.getElementById('numpad').className      = 'numpad show';
  document.getElementById('mainArea').className    = 'main pad-open';

  // 入力欄が見えるようスクロール
  setTimeout(function() {
    inp.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 120);
}

function closePad() {
  if (_padTarget) {
    _padTarget.className = _padTarget.className.replace(' active-inp','').replace('active-inp','');
  }
  _padTarget = null;
  document.getElementById('padOverlay').className = 'numpad-overlay';
  document.getElementById('numpad').className      = 'numpad';
  document.getElementById('mainArea').className    = 'main';
}

function npInput(key) {
  if (!_padTarget) return;

  if (key === 'BS') {
    if (_padRaw.length > 0) _padRaw = _padRaw.slice(0, -1);
    else _padNeg = false;
  } else if (key === '-') {
    _padNeg = !_padNeg;
  } else {
    // 数字は最大6桁まで
    if (_padRaw.length < 6) _padRaw += key;
  }

  _refreshPadVal();
  measCalc(_padPh);
}

function _refreshPadVal() {
  var digits = _padRaw;
  var formatted;
  if (digits.length === 0)      formatted = '';
  else if (digits.length === 1) formatted = '0.0' + digits;
  else if (digits.length === 2) formatted = '0.' + digits;
  else                          formatted = digits.slice(0,-2) + '.' + digits.slice(-2);
  if (_padNeg && formatted) formatted = '-' + formatted;

  if (_padTarget) _padTarget.value = formatted;
  document.getElementById('padVal').textContent = formatted || '—';
}

function _setActiveInp(inp) {
  // 前のハイライトを消す
  var alls = document.getElementsByClassName('meas-in');
  var i;
  for (i = 0; i < alls.length; i++) {
    alls[i].className = alls[i].className.replace(' active-inp','').replace('active-inp','');
  }
  inp.className += ' active-inp';
}

// ===== 判定計算 =====
function measCalc(ph) {
  var i, col, onEl, offEl, dEl, onV, offV, diff, diffStr;
  var gap, dir, absGap, full, whole, half, label;
  for (i = 0; i < COLS.length; i++) {
    col   = COLS[i];
    onEl  = document.getElementById('m' + ph + '_on_'  + col);
    offEl = document.getElementById('m' + ph + '_off_' + col);
    dEl   = document.getElementById('m' + ph + '_d_'   + col);
    if (!dEl) continue;
    onV  = onEl  ? parseFloat(onEl.value)  : NaN;
    offV = offEl ? parseFloat(offEl.value) : NaN;
    if (!isNaN(onV) && !isNaN(offV)) {
      diff    = Math.round((onV - offV) * 1000) / 1000;
      diffStr = diff.toFixed(2);
      if (diff >= 1.83 && diff <= 1.97) {
        dEl.innerHTML   = diffStr + '<br><span style="font-size:11px;">[正常]</span>';
        dEl.style.color = '#4ADE80';
      } else {
        gap    = Math.round((1.90 - diff) * 1000) / 1000;
        dir    = gap > 0 ? '緩め' : '締め';
        absGap = Math.abs(gap);
        full   = Math.floor(Math.round(absGap / 0.125));
        whole  = Math.floor(full / 2);
        half   = (full % 2 === 1);
        label  = '';
        if (whole > 0 && half)       label = whole + '角半';
        else if (whole > 0 && !half) label = whole + '角';
        else if (half)               label = '半角';
        else                         label = '？';
        dEl.innerHTML   = diffStr + '<br><span style="font-size:11px;">[' + label + dir + ']</span>';
        dEl.style.color = (diff >= 1.80 && diff <= 2.00) ? '#fff' : '#ff9800';
      }
    } else {
      dEl.textContent = '—';
      dEl.style.color = '';
    }
  }
  updateSummary();
}

// ===== サマリー更新 =====
function updateSummary() {
  var grid = document.getElementById('summaryGrid');
  if (!grid) return;
  var html = '';
  var pi, ci, ph, col, phLabel, phColor, dEl, val, color;
  for (pi = 0; pi < PHASES.length; pi++) {
    ph      = PHASES[pi];
    phLabel = ph.toUpperCase() + '相';
    phColor = ph === 'u' ? '#ff9800' : ph === 'v' ? '#69d469' : '#5bc8ff';
    for (ci = 0; ci < COLS.length; ci++) {
      col   = COLS[ci];
      dEl   = document.getElementById('m' + ph + '_d_' + col);
      val   = dEl ? (dEl.textContent || dEl.innerText || '').replace(/[\n\r]/g,'').replace(/\s+/g,' ').replace(/^\s+|\s+$/g,'') : '—';
      color = dEl ? dEl.style.color : '';
      if (!val || val === '') val = '—';
      html += '<div class="summary-cell">'
            + '<div class="summary-cell-label" style="color:' + phColor + ';">' + phLabel + '-' + col.toUpperCase() + '</div>'
            + '<div class="summary-cell-val" style="color:' + (color || '#615D5A') + ';">' + val + '</div>'
            + '</div>';
    }
  }
  grid.innerHTML = html;
}

// ===== クリア系 =====
function clearOne(btn, ph) {
  var wrap = btn.parentNode;
  var inp  = wrap ? wrap.getElementsByTagName('input')[0] : null;
  if (inp) {
    inp.value = '';
    if (_padTarget === inp) { _padRaw = ''; _padNeg = false; _refreshPadVal(); }
  }
  measCalc(ph);
}

function clearCol(ph, col) {
  var rows = ['on','off'];
  var i, el;
  for (i = 0; i < rows.length; i++) {
    el = document.getElementById('m' + ph + '_' + rows[i] + '_' + col);
    if (el) {
      el.value = '';
      if (_padTarget === el) { _padRaw = ''; _padNeg = false; _refreshPadVal(); }
    }
  }
  measCalc(ph);
}

function resetAll() {
  if (!confirm('全ての入力をリセットしますか？')) return;
  var pi, ci, ri, ph, col, rows, el, dEl;
  rows = ['on','off'];
  for (pi = 0; pi < PHASES.length; pi++) {
    ph = PHASES[pi];
    for (ci = 0; ci < COLS.length; ci++) {
      col = COLS[ci];
      for (ri = 0; ri < rows.length; ri++) {
        el = document.getElementById('m' + ph + '_' + rows[ri] + '_' + col);
        if (el) el.value = '';
      }
      dEl = document.getElementById('m' + ph + '_d_' + col);
      if (dEl) { dEl.textContent = '—'; dEl.style.color = ''; }
    }
  }
  closePad();
  updateSummary();
  showToast('リセットしました');
}

// ===== トースト =====
var _tt;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show';
  clearTimeout(_tt);
  _tt = setTimeout(function(){ t.className = 'toast'; }, 2200);
}

// ===== 初期化 =====
window.onload = function() {
  updateSummary();
};
</script>
