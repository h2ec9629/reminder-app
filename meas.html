<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A1614">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>三相測定</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1A1614;
      --bg-2:       #141210;
      --surface:    #262220;
      --surface-2:  #302C2A;
      --border:     #3A3532;
      --text:       #F0EBE6;
      --text-sub:   #9E9691;
      --text-faint: #615D5A;
      --accent:     #C85C3A;
      --header-h:   44px;
      --numpad-h:   325px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: var(--bg); color: var(--text);
      overflow-x: hidden; overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== HEADER ===== */
    .header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      padding: 0 14px; z-index: 100;
    }
    .header-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .header-sub   { margin-left: 10px; font-size: 11px; color: var(--text-faint); }
    .header-reset {
      margin-left: auto;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-sub); font-size: 12px; font-weight: 700;
      padding: 6px 13px; border-radius: 8px;
      cursor: pointer; font-family: inherit;
    }
    .header-update {
      margin-left: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      font-size: 16px; padding: 5px 10px; border-radius: 8px;
      cursor: pointer;
    }

    /* ===== MAIN ===== */
    .main {
      margin-top: var(--header-h);
      padding: 12px 10px;
      margin-bottom: var(--numpad-h);
    }

    /* ===== PHASE BLOCK ===== */
    .phase-block {
      margin-bottom: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .phase-hd { font-size: 13px; font-weight: 700; padding: 7px 10px; border-bottom: 2px solid currentColor; }
    .th-u { color: #ff9800; }
    .th-v { color: #69d469; }
    .th-w { color: #5bc8ff; }

    /* ===== TABLE ===== */
    .meas-tbl { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
    .meas-tbl th {
      padding: 5px 6px; text-align: left;
      color: var(--text-sub); font-weight: 600;
      border-bottom: 1px solid var(--border);
      background: var(--bg-2);
    }
    .meas-tbl td { padding: 4px 5px; text-align: center; border-bottom: 1px solid var(--border); }
    .meas-tbl tr:last-child td { border-bottom: none; }
    .col-lbl { text-align: left !important; color: var(--text-sub); font-size: 12px; white-space: nowrap; width: 14%; padding: 4px 3px !important; }

    /* ===== INPUT CELL ===== */
    .meas-td-wrap {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: stretch; align-items: stretch;
      border: 1px solid var(--border); border-radius: 6px;
      overflow: hidden; background: var(--surface-2);
    }
    .meas-td-wrap .meas-in { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; min-width: 0; border: none !important; background: transparent; border-radius: 0; }
    .meas-x {
      -webkit-flex-shrink: 0; flex-shrink: 0;
      background: none; border: none;
      border-left: 1px solid var(--border);
      color: var(--text-faint); font-size: 14px;
      cursor: pointer; padding: 4px 7px;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
    }

    .meas-in {
      width: 100%; border: 1px solid var(--border); border-radius: 4px;
      background: var(--surface-2); color: var(--text);
      font-size: 14px; padding: 5px 3px;
      text-align: right; font-family: inherit;
      -webkit-appearance: none; appearance: none; outline: none;
    }
    .meas-in.active-inp { border-color: var(--accent) !important; background: #3A1E12 !important; color: #FB9070 !important; }

    /* ===== DIFF CELL ===== */
    .meas-diff { font-weight: 700; font-size: 12px; line-height: 1.4; vertical-align: middle; padding: 5px 3px; }

    /* ===== COL HEADER ===== */
    .col-hd-wrap {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: space-between; justify-content: space-between;
    }
    .col-reset {
      background: none; border: 1px solid var(--border);
      border-radius: 4px; color: var(--text-faint);
      font-size: 10px; padding: 2px 5px;
      cursor: pointer; font-family: inherit;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: calc(var(--numpad-h) + 10px); left: 50%;
      -webkit-transform: translateX(-50%);
      transform: translateX(-50%);
      background: var(--surface-2); color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 18px; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      z-index: 999; white-space: nowrap;
      display: none;
    }
    .toast.show { display: block; }

    /* ===== NUMPAD 常駐 ===== */
    .numpad {
      position: fixed; left: 0; right: 0; bottom: 0;
      height: var(--numpad-h);
      background: var(--surface);
      border-top: 2px solid var(--accent);
      z-index: 200;
      padding: 8px 8px 12px;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-flex-direction: column; flex-direction: column;
      gap: 6px;
    }

    /* 現在値バー */
    .numpad-val-bar {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 8px; padding: 4px 10px; gap: 8px;
      -webkit-flex-shrink: 0; flex-shrink: 0;
    }
    .numpad-target-label {
      font-size: 12px; color: var(--text-faint);
      -webkit-flex: 1; flex: 1;
    }
    .numpad-target-val {
      font-size: 24px; font-weight: 700; color: var(--text);
      text-align: right; min-width: 80px;
    }

    /* 4×3 グリッド */
    .numpad-grid {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
      gap: 5px; -webkit-flex: 1; flex: 1;
    }
    .np-btn {
      -webkit-box-flex: 1; -webkit-flex: 1 1 28%; flex: 1 1 28%;
      min-width: 0;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text); font-size: 28px; font-weight: 600;
      border-radius: 8px; cursor: pointer; font-family: inherit;
      text-align: center; line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .np-btn:active { background: var(--border); }
    .np-btn-bs    { background: var(--bg-2); color: #F87171; font-size: 22px; }
    .np-btn-ok    { background: var(--accent); color: #fff; border-color: var(--accent); font-size: 22px; }
  </style>
</head>
<body>

<header class="header">
  <span class="header-title">三相測定</span>
  <span class="header-sub">U / V / W</span>
  <button class="header-reset" onclick="resetAll()">全リセット</button>
  <button class="header-update" onclick="forceUpdate()">🔄</button>
</header>

<main class="main">

  <!-- U相 -->
  <div class="phase-block">
    <div class="phase-hd th-u">U相</div>
    <table class="meas-tbl">
      <thead><tr>
        <th style="width:14%"></th>
        <th><div class="col-hd-wrap"><span class="th-u">R</span><button class="col-reset" onclick="clearCol('u','r')">CLR</button></div></th>
        <th><div class="col-hd-wrap"><span>A</span><button class="col-reset" onclick="clearCol('u','a')">CLR</button></div></th>
        <th><div class="col-hd-wrap"><span>B</span><button class="col-reset" onclick="clearCol('u','b')">CLR</button></div></th>
      </tr></thead>
      <tbody>
        <tr>
          <td class="col-lbl">ON</td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mu_on_r" type="text" readonly data-ph="u"><button class="meas-x" data-clear="mu_on_r" data-ph="u">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mu_on_a" type="text" readonly data-ph="u"><button class="meas-x" data-clear="mu_on_a" data-ph="u">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mu_on_b" type="text" readonly data-ph="u"><button class="meas-x" data-clear="mu_on_b" data-ph="u">×</button></div></td>
        </tr>
        <tr>
          <td class="col-lbl">OFF</td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mu_off_r" type="text" readonly data-ph="u"><button class="meas-x" data-clear="mu_off_r" data-ph="u">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mu_off_a" type="text" readonly data-ph="u"><button class="meas-x" data-clear="mu_off_a" data-ph="u">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mu_off_b" type="text" readonly data-ph="u"><button class="meas-x" data-clear="mu_off_b" data-ph="u">×</button></div></td>
        </tr>
        <tr>
          <td class="col-lbl">判定</td>
          <td class="meas-diff" id="mu_d_r">—</td>
          <td class="meas-diff" id="mu_d_a">—</td>
          <td class="meas-diff" id="mu_d_b">—</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- V相 -->
  <div class="phase-block">
    <div class="phase-hd th-v">V相</div>
    <table class="meas-tbl">
      <thead><tr>
        <th style="width:14%"></th>
        <th><div class="col-hd-wrap"><span class="th-v">R</span><button class="col-reset" onclick="clearCol('v','r')">CLR</button></div></th>
        <th><div class="col-hd-wrap"><span>A</span><button class="col-reset" onclick="clearCol('v','a')">CLR</button></div></th>
        <th><div class="col-hd-wrap"><span>B</span><button class="col-reset" onclick="clearCol('v','b')">CLR</button></div></th>
      </tr></thead>
      <tbody>
        <tr>
          <td class="col-lbl">ON</td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mv_on_r" type="text" readonly data-ph="v"><button class="meas-x" data-clear="mv_on_r" data-ph="v">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mv_on_a" type="text" readonly data-ph="v"><button class="meas-x" data-clear="mv_on_a" data-ph="v">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mv_on_b" type="text" readonly data-ph="v"><button class="meas-x" data-clear="mv_on_b" data-ph="v">×</button></div></td>
        </tr>
        <tr>
          <td class="col-lbl">OFF</td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mv_off_r" type="text" readonly data-ph="v"><button class="meas-x" data-clear="mv_off_r" data-ph="v">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mv_off_a" type="text" readonly data-ph="v"><button class="meas-x" data-clear="mv_off_a" data-ph="v">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mv_off_b" type="text" readonly data-ph="v"><button class="meas-x" data-clear="mv_off_b" data-ph="v">×</button></div></td>
        </tr>
        <tr>
          <td class="col-lbl">判定</td>
          <td class="meas-diff" id="mv_d_r">—</td>
          <td class="meas-diff" id="mv_d_a">—</td>
          <td class="meas-diff" id="mv_d_b">—</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- W相 -->
  <div class="phase-block">
    <div class="phase-hd th-w">W相</div>
    <table class="meas-tbl">
      <thead><tr>
        <th style="width:14%"></th>
        <th><div class="col-hd-wrap"><span class="th-w">R</span><button class="col-reset" onclick="clearCol('w','r')">CLR</button></div></th>
        <th><div class="col-hd-wrap"><span>A</span><button class="col-reset" onclick="clearCol('w','a')">CLR</button></div></th>
        <th><div class="col-hd-wrap"><span>B</span><button class="col-reset" onclick="clearCol('w','b')">CLR</button></div></th>
      </tr></thead>
      <tbody>
        <tr>
          <td class="col-lbl">ON</td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mw_on_r" type="text" readonly data-ph="w"><button class="meas-x" data-clear="mw_on_r" data-ph="w">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mw_on_a" type="text" readonly data-ph="w"><button class="meas-x" data-clear="mw_on_a" data-ph="w">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mw_on_b" type="text" readonly data-ph="w"><button class="meas-x" data-clear="mw_on_b" data-ph="w">×</button></div></td>
        </tr>
        <tr>
          <td class="col-lbl">OFF</td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mw_off_r" type="text" readonly data-ph="w"><button class="meas-x" data-clear="mw_off_r" data-ph="w">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mw_off_a" type="text" readonly data-ph="w"><button class="meas-x" data-clear="mw_off_a" data-ph="w">×</button></div></td>
          <td><div class="meas-td-wrap"><input class="meas-in" id="mw_off_b" type="text" readonly data-ph="w"><button class="meas-x" data-clear="mw_off_b" data-ph="w">×</button></div></td>
        </tr>
        <tr>
          <td class="col-lbl">判定</td>
          <td class="meas-diff" id="mw_d_r">—</td>
          <td class="meas-diff" id="mw_d_a">—</td>
          <td class="meas-diff" id="mw_d_b">—</td>
        </tr>
      </tbody>
    </table>
  </div>

</main>

<!-- ===== 常駐テンキー ===== -->
<div class="numpad">
  <div class="numpad-val-bar">
    <span class="numpad-target-label" id="padLabel">欄をタップして入力</span>
    <span class="numpad-target-val"   id="padVal">—</span>
  </div>
  <div class="numpad-grid" id="numpadGrid">
    <button class="np-btn" data-key="7">7</button>
    <button class="np-btn" data-key="8">8</button>
    <button class="np-btn" data-key="9">9</button>
    <button class="np-btn" data-key="4">4</button>
    <button class="np-btn" data-key="5">5</button>
    <button class="np-btn" data-key="6">6</button>
    <button class="np-btn" data-key="1">1</button>
    <button class="np-btn" data-key="2">2</button>
    <button class="np-btn" data-key="3">3</button>
    <button class="np-btn np-btn-bs"    data-key="BS">⌫</button>
    <button class="np-btn" data-key="0">0</button>
    <button class="np-btn np-btn-ok"   data-key="OK">↵</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var PHASES = ['u','v','w'];
var COLS   = ['r','a','b'];

// ===== フォーカス管理 =====
var _padTarget = null;
var _padPh     = '';
var _padRaw    = '';
var _padNeg    = false;

function focusInp(inp) {
  // 前のハイライト解除
  if (_padTarget) {
    _padTarget.className = _padTarget.className.replace(' active-inp','').replace('active-inp','');
    // フォーカスが外れたら判定更新
    measCalc(_padPh);
  }
  _padTarget = inp;
  _padPh     = inp.getAttribute('data-ph');
  var cur    = inp.value || '';
  _padNeg    = (cur.charAt(0) === '-');
  _padRaw    = cur.replace(/[^0-9]/g, '');

  inp.className += ' active-inp';

  var id     = inp.id;
  var parts  = id.split('_');
  var phMap  = { u:'U相', v:'V相', w:'W相' };
  document.getElementById('padLabel').textContent = phMap[_padPh] + ' ' + (parts[1] === 'on' ? 'ON' : 'OFF') + '-' + parts[2].toUpperCase();
  _refreshPadVal();
}

// ===== テンキー入力 =====
function _npTap(key) {
  if (!_padTarget) return;
  if (key === 'BS') {
    if (_padRaw.length > 0) _padRaw = _padRaw.slice(0, -1);
    else _padNeg = false;
    _refreshPadVal();
  } else if (key === 'OK') {
    // 判定更新して次の欄へフォーカス移動
    if (_padPh) measCalc(_padPh);
    _nextFocus();
  } else {
    if (_padRaw.length < 6) _padRaw += key;
    _refreshPadVal();
  }
}

function _nextFocus() {
  var inputs = document.getElementsByClassName('meas-in');
  var i;
  for (i = 0; i < inputs.length - 1; i++) {
    if (inputs[i] === _padTarget) {
      focusInp(inputs[i + 1]);
      return;
    }
  }
  // 最後の欄ならハイライトだけ外す
  if (_padTarget) {
    _padTarget.className = _padTarget.className.replace(' active-inp','').replace('active-inp','');
    _padTarget = null;
    document.getElementById('padLabel').textContent = '欄をタップして入力';
    document.getElementById('padVal').textContent   = '—';
  }
}

function _refreshPadVal() {
  var d = _padRaw, fmt;
  if (d.length === 0)      fmt = '';
  else if (d.length === 1) fmt = '0.0' + d;
  else if (d.length === 2) fmt = '0.' + d;
  else                     fmt = d.slice(0,-2) + '.' + d.slice(-2);
  if (_padNeg && fmt) fmt = '-' + fmt;
  if (_padTarget) _padTarget.value = fmt;
  document.getElementById('padVal').textContent = fmt || '—';
}

// ===== 判定計算 =====
function measCalc(ph) {
  var i, col, onEl, offEl, dEl, onV, offV, diff, diffStr;
  var gap, dir, absGap, full, whole, half, label;
  for (i = 0; i < COLS.length; i++) {
    col   = COLS[i];
    onEl  = document.getElementById('m' + ph + '_on_'  + col);
    offEl = document.getElementById('m' + ph + '_off_' + col);
    dEl   = document.getElementById('m' + ph + '_d_'   + col);
    if (!dEl) continue;
    onV  = onEl  ? parseFloat(onEl.value)  : NaN;
    offV = offEl ? parseFloat(offEl.value) : NaN;
    if (!isNaN(onV) && !isNaN(offV)) {
      diff    = Math.round((onV - offV) * 1000) / 1000;
      diffStr = diff.toFixed(2);
      if (diff >= 1.83 && diff <= 1.97) {
        dEl.innerHTML   = diffStr + '<br><span style="font-size:11px;">[正常]</span>';
        dEl.style.color = '#4ADE80';
      } else {
        gap    = Math.round((1.90 - diff) * 1000) / 1000;
        dir    = gap > 0 ? '緩め' : '締め';
        absGap = Math.abs(gap);
        full   = Math.floor(Math.round(absGap / 0.125));
        whole  = Math.floor(full / 2);
        half   = (full % 2 === 1);
        label  = whole > 0 && half  ? whole + '角半'
               : whole > 0 && !half ? whole + '角'
               : half                ? '半角' : '？';
        dEl.innerHTML   = diffStr + '<br><span style="font-size:11px;">[' + label + dir + ']</span>';
        dEl.style.color = (diff >= 1.80 && diff <= 2.00) ? '#fff' : '#ff9800';
      }
    } else {
      dEl.textContent = '—';
      dEl.style.color = '';
    }
  }
}

// ===== クリア =====
function clearOne(id, ph) {
  var el = document.getElementById(id);
  if (el) {
    el.value = '';
    if (_padTarget === el) { _padRaw = ''; _padNeg = false; _refreshPadVal(); }
  }
  measCalc(ph);
}

function clearCol(ph, col) {
  var rows = ['on','off'], i, el;
  for (i = 0; i < rows.length; i++) {
    el = document.getElementById('m' + ph + '_' + rows[i] + '_' + col);
    if (el) {
      el.value = '';
      if (_padTarget === el) { _padRaw = ''; _padNeg = false; _refreshPadVal(); }
    }
  }
  measCalc(ph);
}

function resetAll() {
  if (!confirm('全ての入力をリセットしますか？')) return;
  var pi, ci, ri, ph, col, rows, el, dEl;
  rows = ['on','off'];
  for (pi = 0; pi < PHASES.length; pi++) {
    ph = PHASES[pi];
    for (ci = 0; ci < COLS.length; ci++) {
      col = COLS[ci];
      for (ri = 0; ri < rows.length; ri++) {
        el = document.getElementById('m' + ph + '_' + rows[ri] + '_' + col);
        if (el) el.value = '';
      }
      dEl = document.getElementById('m' + ph + '_d_' + col);
      if (dEl) { dEl.textContent = '—'; dEl.style.color = ''; }
    }
  }
  _padTarget = null; _padRaw = ''; _padNeg = false;
  document.getElementById('padLabel').textContent = '欄をタップして入力';
  document.getElementById('padVal').textContent   = '—';
  showToast('リセットしました');
}

// ===== 強制更新 =====
function forceUpdate() {
  showToast('更新中...');
  try {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        var i;
        for (i = 0; i < regs.length; i++) regs[i].unregister();
      });
    }
    if ('caches' in window) {
      caches.keys().then(function(keys) {
        var i;
        for (i = 0; i < keys.length; i++) caches.delete(keys[i]);
      });
    }
  } catch(e) {}
  setTimeout(function() { location.reload(true); }, 800);
}

// ===== トースト =====
var _tt;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show';
  clearTimeout(_tt);
  _tt = setTimeout(function(){ t.className = 'toast'; }, 2200);
}

// ===== 初期化 =====
window.onload = function() {
  var i, inputs, btns;

  // 入力欄タップ → フォーカス
  inputs = document.getElementsByTagName('input');
  for (i = 0; i < inputs.length; i++) {
    if (inputs[i].getAttribute('data-ph')) {
      inputs[i].onclick = function() { focusInp(this); };
    }
  }

  // ×ボタン
  btns = document.getElementsByTagName('button');
  for (i = 0; i < btns.length; i++) {
    if (btns[i].getAttribute('data-clear')) {
      btns[i].onclick = (function(id, ph) {
        return function() { clearOne(id, ph); };
      })(btns[i].getAttribute('data-clear'), btns[i].getAttribute('data-ph'));
    }
  }

  // テンキー：イベント委譲1か所
  document.getElementById('numpadGrid').onclick = function(e) {
    var b = e.target;
    if (b.tagName === 'BUTTON') _npTap(b.getAttribute('data-key'));
  };
};
</script>
