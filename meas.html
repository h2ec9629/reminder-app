<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A1614">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="三相測定">
  <link rel="manifest" href="meas_manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>三相測定</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1A1614;
      --bg-2:       #141210;
      --surface:    #262220;
      --surface-2:  #302C2A;
      --border:     #3A3532;
      --text:       #F0EBE6;
      --text-sub:   #9E9691;
      --text-faint: #615D5A;
      --accent:     #C85C3A;
      --header-h:   44px;
      --numpad-h:   299px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: var(--bg); color: var(--text);
      overflow-x: hidden; overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== HEADER 廃止 ===== */
    .header { display: none; }

    /* ===== MAIN ===== */
    .main {
      margin-top: 0;
      padding: 12px 10px;
      margin-bottom: var(--numpad-h);
    }

    /* ===== PHASE BLOCK ===== */
    .phase-block {
      margin-bottom: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .phase-hd { font-size: 13px; font-weight: 700; padding: 7px 10px; border-bottom: 2px solid currentColor; }
    .th-u { color: #FFEB3B; }
    .th-v { color: #69d469; }
    .th-w { color: #5bc8ff; }

    /* ===== TABLE ===== */
    .meas-tbl { width: 100%; border-collapse: collapse; font-size: 15px; table-layout: fixed; }
    .meas-tbl th {
      padding: 5px 6px; text-align: left;
      color: var(--text-sub); font-weight: 600;
      border-bottom: 1px solid var(--border);
      background: var(--bg-2);
    }
    .meas-tbl td { padding: 4px 5px; text-align: center; border-bottom: 1px solid var(--border); }
    .meas-tbl tr:last-child td { border-bottom: none; }
    .col-lbl { text-align: left !important; color: var(--text-sub); font-size: 14px; white-space: nowrap; width: 14%; padding: 4px 3px !important; }

    /* ===== INPUT CELL ===== */
    .meas-td-wrap {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: stretch; align-items: stretch;
      border: 1px solid var(--border); border-radius: 999px;
      overflow: hidden; background: var(--surface-2);
    }
    .meas-td-wrap .meas-in { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; min-width: 0; border: none !important; background: transparent; border-radius: 0; }
    .meas-td-wrap.mc-g { background: #000; }
    .meas-td-wrap.mc-r { background: #000; }
    .meas-x {
      -webkit-flex-shrink: 0; flex-shrink: 0;
      background: none; border: none;
      border-left: 1px solid var(--border);
      color: #D97757; font-size: 21px;
      cursor: pointer; padding: 6px 11px;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
    }

    .meas-in {
      width: 100%; border: 1px solid var(--border); border-radius: 4px;
      background: var(--surface-2); color: var(--text);
      font-size: 16px; padding: 5px 3px;
      text-align: right; font-family: inherit;
      -webkit-appearance: none; appearance: none; outline: none;
    }
    .meas-in.active-inp { border-color: var(--accent) !important; background: #FFFFFF !important; color: #000000 !important; }
    .meas-prev {
      -webkit-flex-shrink: 0; flex-shrink: 0;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: flex-end; justify-content: flex-end;
      min-width: 38px; padding: 0 4px;
      font-size: 16px; color: #7FB3FF;
      background: var(--bg-2); border-right: 1px solid var(--border);
    }
    .meas-prev:empty { display: none; }

    /* ===== 測定ヘッダー ===== */
    .meas-header {
      position: -webkit-sticky; position: sticky; top: 0; z-index: 50;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 7px 10px; margin-bottom: 10px;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
      -webkit-align-items: baseline; align-items: baseline;
    }
    .mh-cur  {
      font-family: inherit; font-size: 14px; font-weight: 700;
      color: var(--accent); background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 3px 10px; cursor: pointer;
    }
    .mh-cur::after { content: ' ✎'; font-weight: 400; color: var(--text-sub); }
    .mh-cur:active { background: var(--surface); }
    .mh-prev { font-size: 13px; color: #7FB3FF; }
    .mh-prev::before { content: '｜'; margin: 0 8px; color: var(--text-faint); font-weight: 400; }

    /* ===== DIFF CELL ===== */
    .meas-diff { font-weight: 700; font-size: 14px; line-height: 1.1; vertical-align: middle; padding: 3px; }
    .d-num { display: block; }
    .d-lbl { display: block; font-size: 13px; font-weight: 600; }
    .meas-diff.judge-first { position: relative; }
    .meas-diff.judge-first::before { content: "判定"; position: absolute; left: 3px; top: 3px; font-size: 10px; font-weight: 600; color: var(--text-sub); }

    /* ===== COL HEADER ===== */
    .col-hd-wrap {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: space-between; justify-content: space-between;
    }
    .col-reset {
      background: none; border: 1px solid var(--border);
      border-radius: 4px; color: #D97757;
      font-size: 12px; padding: 2px 5px;
      cursor: pointer; font-family: inherit;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: calc(var(--numpad-h) + 10px); left: 50%;
      -webkit-transform: translateX(-50%);
      transform: translateX(-50%);
      background: var(--surface-2); color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 18px; border-radius: 10px;
      font-size: 15px; font-weight: 600;
      z-index: 999; white-space: nowrap;
      display: none;
    }
    .toast.show { display: block; }

    /* ===== NUMPAD 常駐 ===== */
    .numpad {
      position: fixed; left: 0; right: 0; bottom: 0;
      height: var(--numpad-h);
      background: var(--surface);
      border-top: 2px solid var(--accent);
      z-index: 200;
      padding: 6px 6px 10px;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-flex-direction: row; flex-direction: row;
      -webkit-justify-content: space-between; justify-content: space-between;
      gap: 6px;
    }

    /* 左パネル：サイドメニュー */
    .numpad-side {
      -webkit-flex: 0 0 28%; flex: 0 0 28%;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-flex-direction: column; flex-direction: column;
      gap: 4px;
    }
    .numpad-app-title {
      font-size: 11px; font-weight: 700;
      color: var(--text-faint);
      padding: 2px 4px;
      letter-spacing: 0.5px;
    }
    .numpad-side-btn {
      -webkit-flex: 1; flex: 1;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-sub); font-size: 14px; font-weight: 700;
      border-radius: 8px; cursor: pointer; font-family: inherit;
      text-align: center; line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .numpad-side-btn:active { background: var(--border); }
    .numpad-side-btn.btn-save { background: var(--accent); border-color: var(--accent); color: #fff; }
    .numpad-side-btn.btn-hist { }
    .numpad-side-btn.btn-hist.active { border-color: var(--accent); color: var(--accent); }
    .numpad-side-btn.btn-reset { color: #F87171; border-color: #2A1010; }

    /* 右パネル：テンキー */
    .numpad-right {
      -webkit-flex: 0 0 60%; flex: 0 0 60%;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-flex-direction: column; flex-direction: column;
      gap: 4px;
    }

    /* 現在値バー */
    .numpad-val-bar {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 8px; padding: 4px 8px; gap: 6px;
      -webkit-flex-shrink: 0; flex-shrink: 0;
    }
    .numpad-target-label {
      font-size: 13px; font-weight: 700; color: #fff;
      -webkit-flex: 1; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .numpad-target-val {
      font-size: 20px; font-weight: 700; color: var(--text);
      text-align: right; min-width: 60px;
    }

    /* 4×3 グリッド */
    .numpad-grid {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
      gap: 4px; -webkit-flex: 1; flex: 1;
    }
    .np-btn {
      -webkit-box-flex: 1; -webkit-flex: 1 1 28%; flex: 1 1 28%;
      min-width: 0;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text); font-size: 24px; font-weight: 600;
      border-radius: 8px; cursor: pointer; font-family: inherit;
      text-align: center; line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .np-btn:active { background: var(--border); }
    .np-btn-bs    { background: var(--bg-2); color: #F87171; font-size: 20px; }
    .np-btn-ok    { background: var(--accent); color: #fff; border-color: var(--accent); font-size: 20px; }

    /* ===== 履歴画面 ===== */
    .hist-view {
      display: none;
      margin-top: 0;
      height: 100vh;
      display: -webkit-box; display: -webkit-flex; display: flex;
    }
    .hist-view.hidden { display: none !important; }

    /* サイドバー */
    .hist-sidebar {
      width: 38%;
      min-width: 110px;
      max-width: 160px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      -webkit-flex-shrink: 0; flex-shrink: 0;
    }
    .hist-sidebar-hd {
      font-size: 11px; font-weight: 700; color: var(--text-faint);
      padding: 8px 10px 6px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-2);
      position: sticky; top: 0;
    }
    .hist-back-btn {
      display: block; width: 100%;
      background: var(--accent); border: none;
      color: #fff; font-size: 15px; font-weight: 700;
      padding: 12px 10px;
      cursor: pointer; font-family: inherit;
      text-align: center; letter-spacing: 1px;
      border-bottom: 2px solid rgba(0,0,0,0.25);
      position: sticky; top: 0; z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }
    .hist-back-btn:active { opacity: 0.8; }
    .hist-item {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .hist-item.selected { background: var(--surface-2); border-left: 3px solid var(--accent); }
    .hist-item-date { font-size: 11px; color: var(--text-sub); }
    .hist-item-memo { font-size: 12px; font-weight: 700; color: var(--text); margin-top: 2px; word-break: break-all; }
    .hist-item-del  { float: right; background: none; border: none; color: var(--text-faint); font-size: 14px; cursor: pointer; padding: 0 2px; }
    .hist-pending   { float: right; font-size: 9px; font-weight: 700; color: #ff9800; border: 1px solid #ff9800; border-radius: 4px; padding: 1px 4px; margin-right: 18px; }
    .hist-empty     { font-size: 12px; color: var(--text-faint); padding: 16px 10px; text-align: center; }
    .hist-item-kiban { font-size: 15px; font-weight: 700; color: var(--text); word-break: break-all; }

    /* 詳細：機番内の各ステータスセクション */
    .hist-rec { margin-bottom: 16px; border: 1px solid var(--border); border-radius: 8px; padding: 8px 8px 4px; background: var(--surface); }
    .hist-rec-hd {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      gap: 8px; margin-bottom: 6px;
    }
    .hist-rec-status { font-size: 14px; font-weight: 700; color: var(--accent); }
    .hist-rec-pend { font-size: 9px; font-weight: 700; color: #ff9800; border: 1px solid #ff9800; border-radius: 4px; padding: 1px 4px; }
    .hist-rec-date { font-size: 11px; color: var(--text-faint); margin-left: auto; }
    .hist-rec-del { background: none; border: 1px solid var(--border); border-radius: 4px; color: #F87171; font-size: 14px; cursor: pointer; padding: 1px 9px; -webkit-flex-shrink: 0; flex-shrink: 0; }

    /* 結果エリア */
    .hist-detail {
      -webkit-flex: 1; flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 10px 10px 20px;
      background: var(--bg);
    }
    .hist-detail-empty { font-size: 13px; color: var(--text-faint); padding: 30px 10px; text-align: center; }
    .hist-detail-date  { font-size: 11px; color: var(--text-faint); margin-bottom: 4px; }
    .hist-detail-memo  { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 12px; }

    /* 結果テーブル */
    .hr-tbl { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 10px; table-layout: fixed; }
    .hr-tbl th {
      background: var(--bg-2); color: var(--text-sub); font-weight: 600;
      padding: 4px 5px; border: 1px solid var(--border); text-align: center;
    }
    .hr-tbl td {
      padding: 4px 5px; border: 1px solid var(--border); text-align: right;
      color: var(--text); background: var(--surface);
    }
    .hr-tbl td.lbl { text-align: left; color: var(--text-sub); font-size: 11px; background: var(--bg-2); }
    .hr-tbl td.diff-ok  { color: #4ADE80; font-weight: 700; }
    .hr-tbl td.diff-warn { color: #fff; font-weight: 700; }
    .hr-tbl td.diff-ng  { color: #ff9800; font-weight: 700; }
    .hr-ph-hd { font-size: 12px; font-weight: 700; padding: 6px 2px 3px; }
    .hr-ph-u  { color: #FFEB3B; }
    .hr-ph-v  { color: #69d469; }
    .hr-ph-w  { color: #5bc8ff; }

    /* ===== 保存パネル（テンキー上） ===== */
    .save-panel {
      display: none;
      position: fixed; left: 0; right: 0;
      bottom: var(--numpad-h);
      background: var(--surface);
      border-top: 2px solid var(--accent);
      border-bottom: 1px solid var(--border);
      z-index: 210;
      padding: 10px 12px;
    }
    .save-panel.show { display: block; }
    .save-panel-title { font-size: 12px; font-weight: 700; color: var(--text-faint); margin-bottom: 8px; }
    /* 機番行 */
    .save-kiban-row {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      gap: 8px; margin-bottom: 8px;
    }
    .save-kiban-label { font-size: 11px; color: var(--text-sub); font-weight: 600; -webkit-flex-shrink: 0; flex-shrink: 0; }
    .save-kiban-val {
      -webkit-flex: 1; flex: 1;
      background: var(--surface-2); border: 1px solid var(--accent);
      border-radius: 6px; color: #FFB899;
      font-size: 20px; font-weight: 700;
      padding: 4px 10px; text-align: right;
      min-height: 34px;
    }
    /* 状態ボタン行 */
    .save-status-row {
      display: -webkit-box; display: -webkit-flex; display: flex;
      gap: 5px; margin-bottom: 8px;
    }
    .save-status-btn {
      -webkit-flex: 1; flex: 1;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-sub); font-size: 11px; font-weight: 700;
      padding: 6px 2px; border-radius: 6px;
      cursor: pointer; font-family: inherit; text-align: center;
    }
    .save-status-btn.sel { background: var(--accent); border-color: var(--accent); color: #fff; }
    /* 操作ボタン行 */
    .save-act-row {
      display: -webkit-box; display: -webkit-flex; display: flex;
      gap: 8px;
    }
    .save-act-cancel {
      -webkit-flex: 1; flex: 1;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-sub); font-size: 13px; font-weight: 700;
      padding: 7px; border-radius: 7px; cursor: pointer; font-family: inherit;
    }
    .save-act-ok {
      -webkit-flex: 2; flex: 2;
      background: var(--accent); border: 1px solid var(--accent);
      color: #fff; font-size: 13px; font-weight: 700;
      padding: 7px; border-radius: 7px; cursor: pointer; font-family: inherit;
    }
    /* ===== オプションパネル：PAT入力欄 ===== */
    .opt-pat-input {
      -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
      background: var(--surface-2); border: 1px solid var(--accent);
      border-radius: 6px; color: #FFB899;
      font-size: 14px; font-weight: 600;
      padding: 6px 10px; text-align: left;
      font-family: inherit; outline: none;
      min-height: 34px;
      -webkit-appearance: none; appearance: none;
    }
  </style>
</head>
<body>

<header class="header"></header>

<main class="main">

  <div class="meas-header" id="measHeader">
    <button class="mh-cur" id="mhCur" type="button" onclick="reopenSetup()">機番未設定</button>
    <div class="mh-prev" id="mhPrev">前回値: —</div>
  </div>

  <!-- U相 -->
  <div class="phase-block">
    <div class="phase-hd th-u">U相</div>
    <table class="meas-tbl">
      <thead><tr>
        <th><div class="col-hd-wrap"><span>B</span><button class="col-reset" data-colclear="b" data-ph="u">CLR</button></div></th>
        <th><div class="col-hd-wrap"><span>A</span><button class="col-reset" data-colclear="a" data-ph="u">CLR</button></div></th>
        <th><div class="col-hd-wrap"><span class="th-u">R</span><button class="col-reset" data-colclear="r" data-ph="u">CLR</button></div></th>
      </tr></thead>
      <tbody>
        <tr>
          <td><div class="meas-td-wrap mc-g"><span class="meas-prev" id="p_mu_on_b"></span><input class="meas-in" id="mu_on_b" type="text" readonly data-ph="u"><button class="meas-x" data-clear="mu_on_b" data-ph="u">×</button></div></td>
          <td><div class="meas-td-wrap mc-r"><span class="meas-prev" id="p_mu_on_a"></span><input class="meas-in" id="mu_on_a" type="text" readonly data-ph="u"><button class="meas-x" data-clear="mu_on_a" data-ph="u">×</button></div></td>
          <td><div class="meas-td-wrap mc-g"><span class="meas-prev" id="p_mu_on_r"></span><input class="meas-in" id="mu_on_r" type="text" readonly data-ph="u"><button class="meas-x" data-clear="mu_on_r" data-ph="u">×</button></div></td>
        </tr>
        <tr>
          <td><div class="meas-td-wrap mc-r"><span class="meas-prev" id="p_mu_off_b"></span><input class="meas-in" id="mu_off_b" type="text" readonly data-ph="u"><button class="meas-x" data-clear="mu_off_b" data-ph="u">×</button></div></td>
          <td><div class="meas-td-wrap mc-g"><span class="meas-prev" id="p_mu_off_a"></span><input class="meas-in" id="mu_off_a" type="text" readonly data-ph="u"><button class="meas-x" data-clear="mu_off_a" data-ph="u">×</button></div></td>
          <td><div class="meas-td-wrap mc-r"><span class="meas-prev" id="p_mu_off_r"></span><input class="meas-in" id="mu_off_r" type="text" readonly data-ph="u"><button class="meas-x" data-clear="mu_off_r" data-ph="u">×</button></div></td>
        </tr>
        <tr>
          <td class="meas-diff judge-first" id="mu_d_b"><span class="d-num">—</span><br><span class="d-lbl"></span></td>
          <td class="meas-diff" id="mu_d_a"><span class="d-num">—</span><br><span class="d-lbl"></span></td>
          <td class="meas-diff" id="mu_d_r"><span class="d-num">—</span><br><span class="d-lbl"></span></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- V相 -->
  <div class="phase-block">
    <div class="phase-hd th-v">V相</div>
    <table class="meas-tbl">
      <thead><tr>
        <th><div class="col-hd-wrap"><span>B</span><button class="col-reset" data-colclear="b" data-ph="v">CLR</button></div></th>
        <th><div class="col-hd-wrap"><span>A</span><button class="col-reset" data-colclear="a" data-ph="v">CLR</button></div></th>
        <th><div class="col-hd-wrap"><span class="th-v">R</span><button class="col-reset" data-colclear="r" data-ph="v">CLR</button></div></th>
      </tr></thead>
      <tbody>
        <tr>
          <td><div class="meas-td-wrap mc-g"><span class="meas-prev" id="p_mv_on_b"></span><input class="meas-in" id="mv_on_b" type="text" readonly data-ph="v"><button class="meas-x" data-clear="mv_on_b" data-ph="v">×</button></div></td>
          <td><div class="meas-td-wrap mc-r"><span class="meas-prev" id="p_mv_on_a"></span><input class="meas-in" id="mv_on_a" type="text" readonly data-ph="v"><button class="meas-x" data-clear="mv_on_a" data-ph="v">×</button></div></td>

<script>
var PHASES = ['u','v','w'];
var COLS   = ['b','a','r'];

// ===== フォーカス管理 =====
var _padTarget = null;
var _padPh     = '';
var _padRaw    = '';
var _padNeg    = false;
var _inputs    = [];  // ① 起動時にキャッシュ

function focusInp(inp) {
  if (!_setupDone) return; // 機番・ステータス未確定のうちは測定欄をロック
  if (_padTarget) {
    _padTarget.className = _padTarget.className.replace(' active-inp','').replace('active-inp','');
    measCalc(_padPh);
  }
  _padTarget = inp;
  _padPh     = inp.getAttribute('data-ph');
  var cur    = inp.value || '';
  _padNeg    = (cur.charAt(0) === '-');
  _padRaw    = cur.replace(/[^0-9]/g, '');

  inp.className += ' active-inp';

  var id    = inp.id;
  var parts = id.split('_');
  var phMap = { u:'U相', v:'V相', w:'W相' };
  document.getElementById('padLabel').textContent = phMap[_padPh] + '-' + parts[2].toUpperCase();
  _refreshPadVal();
}

// ===== テンキー入力 =====
function _npTap(key) {
  // 起動時セットアップ中は機番入力に横取り
  if (_setupMode) { _setupPadKey(key); return; }
  // 保存モード中は機番入力に横取り
  if (_saveMode) { _savePadKey(key); return; }
  if (!_padTarget) return;
  if (key === 'BS') {
    if (_padRaw.length > 0) _padRaw = _padRaw.slice(0, -1);
    else _padNeg = false;
    _refreshPadVal();
  } else if (key === 'OK') {
    if (_padPh) measCalc(_padPh);
    _nextFocus();
  } else {
    if (_padRaw.length < 6) _padRaw += key;
    _refreshPadVal();
  }
}

function _nextFocus() {
  var i;
  for (i = 0; i < _inputs.length - 1; i++) {  // ① キャッシュ済み配列を使用
    if (_inputs[i] === _padTarget) {
      focusInp(_inputs[i + 1]);
      return;
    }
  }
  if (_padTarget) {
    _padTarget.className = _padTarget.className.replace(' active-inp','').replace('active-inp','');
    _padTarget = null;
    document.getElementById('padLabel').textContent = '欄をタップして入力';
    document.getElementById('padVal').textContent   = '—';
  }
}

function _refreshPadVal() {
  var d = _padRaw, fmt;
  if (d.length === 0)      fmt = '';
  else if (d.length <= 2)  fmt = d;
  else if (d.length === 3) fmt = d.slice(0, 2) + '.' + d.slice(2);
  else                     fmt = d.slice(0, 2) + '.' + d.slice(2);
  if (_padNeg && fmt) fmt = '-' + fmt;
  if (_padTarget) _padTarget.value = fmt;
  document.getElementById('padVal').textContent = fmt || '—';
}

// ===== 物理キーボード対応（常駐テンキーはそのまま・キー入力も同じ処理に流す） =====
document.addEventListener('keydown', function(e) {
  var tag = e.target.tagName;
  // PAT入力欄など普通の編集可能なinputでは素通し（テンキーの横取りをしない）
  if (tag === 'INPUT' && !e.target.readOnly) return;
  if (tag === 'TEXTAREA') return;
  var k = e.key;
  if (k >= '0' && k <= '9') {
    _npTap(k);
    e.preventDefault();
  } else if (k === 'Backspace') {
    _npTap('BS');
    e.preventDefault();
  } else if (k === 'Enter') {
    _npTap('OK');
    e.preventDefault();
  }
});

// ===== 判定計算（③ textContent で DOM更新）=====
function _setDiff(dEl, numStr, lblStr, color) {
  var spans = dEl.getElementsByTagName('span');
  dEl.style.color = color;
  if (spans.length >= 2) {
    spans[0].textContent = numStr;
    spans[1].textContent = lblStr;
  } else {
    // フォールバック（念のため）
    dEl.textContent = numStr + ' ' + lblStr;
  }
}

function measCalc(ph) {
  var i, col, onEl, offEl, dEl, onV, offV, diff, diffStr, tmp;
  var gap, dir, absGap, full, whole, half, label;
  for (i = 0; i < COLS.length; i++) {
    col   = COLS[i];
    onEl  = document.getElementById('m' + ph + '_on_'  + col);
    offEl = document.getElementById('m' + ph + '_off_' + col);
    dEl   = document.getElementById('m' + ph + '_d_'   + col);
    if (!dEl) continue;
    onV  = onEl  ? parseFloat(onEl.value)  : NaN;
    offV = offEl ? parseFloat(offEl.value) : NaN;
    if (!isNaN(onV) && !isNaN(offV)) {
      // 大きい値＝ON・小さい値＝OFFになるよう表示欄を入れ替える
      if (onV < offV) {
        tmp = onEl.value; onEl.value = offEl.value; offEl.value = tmp;
        tmp = onV; onV = offV; offV = tmp;
      }
      // 大きい値－小さい値＝差数（入力ミスで段が逆でも計算できるように）
      diff    = Math.round(Math.abs(onV - offV) * 1000) / 1000;
      diffStr = diff.toFixed(2);
      if (diff >= 1.83 && diff <= 1.97) {
        _setDiff(dEl, diffStr, '[正常]', '#4ADE80');
      } else {
        gap    = Math.round((1.90 - diff) * 1000) / 1000;
        dir    = gap > 0 ? '緩め' : '締め';
        absGap = Math.abs(gap);
        full   = Math.floor(Math.round(absGap / 0.125));
        whole  = Math.floor(full / 2);
        half   = (full % 2 === 1);
        label  = whole > 0 && half  ? whole + '角半'
               : whole > 0 && !half ? whole + '角'
               : half                ? '半角' : '？';
        _setDiff(dEl, diffStr, '[' + label + dir + ']', (diff >= 1.80 && diff <= 2.00) ? '#fff' : '#ff9800');
      }
    } else {
      _setDiff(dEl, '—', '', '');
    }
  }
}

// ===== クリア =====
function clearOne(id, ph) {
  var el = document.getElementById(id);
  if (el) {
    el.value = '';
    if (_padTarget === el) { _padRaw = ''; _padNeg = false; _refreshPadVal(); }
  }
  measCalc(ph);
}

function clearCol(ph, col) {
  var rows = ['on','off'], i, el;
  for (i = 0; i < rows.length; i++) {
    el = document.getElementById('m' + ph + '_' + rows[i] + '_' + col);
    if (el) {
      el.value = '';
      if (_padTarget === el) { _padRaw = ''; _padNeg = false; _refreshPadVal(); }
    }
  }
  measCalc(ph);
}

function resetAll() {
  if (!confirm('全ての入力をリセットしますか？')) return;
  var pi, ci, ri, ph, col, rows, el, dEl;
  rows = ['on','off'];
  for (pi = 0; pi < PHASES.length; pi++) {
    ph = PHASES[pi];
    for (ci = 0; ci < COLS.length; ci++) {
      col = COLS[ci];
      for (ri = 0; ri < rows.length; ri++) {
        el = document.getElementById('m' + ph + '_' + rows[ri] + '_' + col);
        if (el) el.value = '';
      }
      dEl = document.getElementById('m' + ph + '_d_' + col);
      if (dEl) { _setDiff(dEl, '—', '', ''); }
    }
  }
  _padTarget = null; _padRaw = ''; _padNeg = false;
  document.getElementById('padLabel').textContent = '欄をタップして入力';
  document.getElementById('padVal').textContent   = '—';
  showToast('リセットしました');
}

// ===== 強制更新 =====
function forceUpdate() {
  showToast('更新中...');
  try {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        var i;
        for (i = 0; i < regs.length; i++) regs[i].unregister();
      });
    }
    if ('caches' in window) {
      caches.keys().then(function(keys) {
        var i;
        for (i = 0; i < keys.length; i++) caches.delete(keys[i]);
      });
    }
  } catch(e) {}
  setTimeout(function() { location.reload(true); }, 1000);
}

// ===== API接続テスト（ヘッダーあり/なしで切り分け） =====
function testApiConnection() {
  var base = MEAS_API_BASE + '/repos/' + MEAS_REPO_OWNER + '/' + MEAS_REPO_NAME;

  var xhrA = new XMLHttpRequest();
  xhrA.open('GET', base + '?a=' + Date.now(), true);
  xhrA.onreadystatechange = function() {
    if (xhrA.readyState !== 4) return;
    _notify('テストA(素の通信)：status ' + xhrA.status);
  };
  xhrA.onerror = function() { _notify('テストA(素の通信)：通信エラー'); };

function _downloadJson(filename, dataObj) {
  try {
    var blob = new Blob([JSON.stringify(dataObj, null, 2)], { type: 'application/json' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  } catch(e) {
    _notify('ファイル保存に失敗しました：' + e.message);
  }
}

// 旧Gist方式は廃止（古いiPadのホーム画面アプリで他ドメイン通信がブロックされたため）
// 同じreminder-app内のファイルを直接読み書きする方式に変更
var MEAS_REPO_OWNER = 'h2ec9629';
var MEAS_REPO_NAME  = 'reminder-app';

var MEAS_HIST_SAME_ORIGIN_URL = 'meas_history.json'; // 同一オリジン（相対パス）

var MEAS_API_BASE = 'https://morning-resonance-c98bh.h2ec9629.workers.dev';

function _b64EncodeUtf8(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

function _b64DecodeUtf8(b64) {
  return decodeURIComponent(escape(atob(b64.replace(/\n/g, ''))));
}

function _escRe(s) {
  return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// 新規1件を保存するとき専用：保存直前にリモートの最新を取りに行ってからマージして書き込む。
// 他端末が追加した分を上書きで消してしまう事故を防ぐための安全版。
function _syncNewRecord(newRecord, callback) {
  var pat = _getMeasPat();
  if (!pat) { _notify('共有NG：PAT未設定（オプションで設定して）'); if (callback) callback(false); return; }
  var apiUrl = MEAS_API_BASE + '/repos/' + MEAS_REPO_OWNER + '/' + MEAS_REPO_NAME + '/contents/' + MEAS_REPO_PATH;

  // 他端末が同時に索引ファイルを更新すると、GET時点のshaがPUT時点で古くなり
  // status:409（競合）になることがある。その場合は最新shaを取り直して再試行する。
  function attempt(triesLeft) {
    var getXhr = new XMLHttpRequest();
    getXhr.open('GET', apiUrl + '?t=' + Date.now(), true);
    getXhr.setRequestHeader('Authorization', 'Bearer ' + pat);
    getXhr.setRequestHeader('Accept', 'application/vnd.github+json');
    getXhr.onreadystatechange = function() {
      if (getXhr.readyState !== 4) return;
      var sha = null, remote = [];
      if (getXhr.status === 200) {
        try {
          var meta = JSON.parse(getXhr.responseText);
          sha = meta.sha;
          remote = JSON.parse(_b64DecodeUtf8(meta.content));
          if (!Array.isArray(remote)) remote = [];
        } catch(e) { remote = []; }
      }
      // ローカルキャッシュ全体は混ぜない（他端末が削除した記録がローカルにだけ
      // 残っていると、それを保存のたびに復活させてリモートに書き戻してしまうため）。
      // 今取得した最新のリモートに、今回保存する新規分＋まだ未送信キューに残っている
      // 他のオフライン保存分も一緒に足す（そうしないと複数件を順番に送るとき、
      // 途中でローカル保存がこの1件だけに上書きされて他の分が消えてしまうため）。
      var all = [newRecord].concat(_loadPending()).concat(remote);
      var seen = {}, merged = [], i, k;
      for (i = 0; i < all.length; i++) {
        k = all[i].date + '|' + all[i].memo;
        if (!seen[k]) { seen[k] = true; merged.push(all[i]); }
      }
      merged.sort(function(a, b) { return b.date < a.date ? -1 : 1; });
      if (merged.length > 50) merged = merged.slice(0, 50);
      _saveHistory(merged);
      _renderSidebar();

      var body = {
        message: '測定ログ更新（機番 ' + (newRecord.kiban || '') + '）',
        content: _b64EncodeUtf8(JSON.stringify(merged, null, 2)),
        branch: 'main'
      };
      if (sha) body.sha = sha;
      var putXhr = new XMLHttpRequest();
      putXhr.open('PUT', apiUrl, true);
      putXhr.setRequestHeader('Authorization', 'Bearer ' + pat);
      putXhr.setRequestHeader('Accept', 'application/vnd.github+json');
      putXhr.setRequestHeader('Content-Type', 'application/json');
      putXhr.onreadystatechange = function() {
        if (putXhr.readyState !== 4) return;
        if (putXhr.status === 200 || putXhr.status === 201) {
          _notify('共有OK：索引ファイル更新済み');
          if (callback) callback(true);
        } else if (putXhr.status === 409 && triesLeft > 0) {
          _notify('共有再試行中：他端末との競合を検知（残り' + triesLeft + '回）');
          setTimeout(function() { attempt(triesLeft - 1); }, 400 + Math.random() * 400);
        } else {
          _notify('共有NG：索引書き込み失敗（status:' + putXhr.status + '）');
          if (callback) callback(false);
        }
      };
      putXhr.onerror = function() { _notify('共有NG：索引書き込み通信エラー'); if (callback) callback(false); };
      putXhr.send(JSON.stringify(body));
    };
    getXhr.onerror = function() { _notify('共有NG：索引取得の通信エラー'); if (callback) callback(false); };
    getXhr.send();
  }

  attempt(3);
}

// 機番ごとにフォルダ分け、ステータス別にjsonで個別保存する際のファイル名を先に決める。
// （再測定は連番で履歴として残す。削除時に対応ファイルを特定できるよう、決めた名前は
//   呼び出し側で履歴レコードのrecordFileとして保存しておく）
function _resolveRecordFilename(kiban, status, callback) {
  var pat = _getMeasPat();
  if (!pat) { callback(status + '.json'); return; }
  var dirUrl = MEAS_API_BASE + '/repos/' + MEAS_REPO_OWNER + '/' + MEAS_REPO_NAME
             + '/contents/records/' + encodeURIComponent(kiban);
  var listXhr = new XMLHttpRequest();
  listXhr.open('GET', dirUrl + '?t=' + Date.now(), true);
  listXhr.setRequestHeader('Authorization', 'Bearer ' + pat);
  listXhr.setRequestHeader('Accept', 'application/vnd.github+json');
  listXhr.onreadystatechange = function() {
    if (listXhr.readyState !== 4) return;
    var existing = [];
    if (listXhr.status === 200) {
      try {
        var parsed = JSON.parse(listXhr.responseText);
        if (Array.isArray(parsed)) existing = parsed;
      } catch(e) {}
    }
    var maxN = 0, found = false, i, name, m;
    var reSuffix = new RegExp('^' + _escRe(status) + '_(\\d+)\\.json$');
    for (i = 0; i < existing.length; i++) {
      name = existing[i].name || '';
      if (name === status + '.json') { found = true; }
      m = name.match(reSuffix);
      if (m) { found = true; var n = parseInt(m[1], 10); if (n > maxN) maxN = n; }
    }
    var filename = found ? (status + '_' + (maxN + 1) + '.json') : (status + '.json');
    callback(filename);
  };
  listXhr.onerror = function() { callback(status + '.json'); };
  listXhr.send();
}

// 決まったファイル名で個別ファイルを書き込む。
// 索引ファイル更新と同時に走らせるとGitHub側のコミットが競合してstatus:409になることがあるため、

function _putRecordFile(data, filename, callback) {

  function attempt(triesLeft) {
    var body = {
      message: '測定記録保存：機番' + kiban + '・' + status,
      content: _b64EncodeUtf8(JSON.stringify(data, null, 2)),

    };

    putXhr.onreadystatechange = function() {
      if (putXhr.readyState !== 4) return;

        if (callback) callback(true);
      } else if (putXhr.status === 409 && triesLeft > 0) {
        _notify('共有再試行中：個別ファイルが競合（残り' + triesLeft + '回）');
        setTimeout(function() { attempt(triesLeft - 1); }, 400 + Math.random() * 400);
      } else {

        if (callback) callback(false);
      }
    };
    putXhr.onerror = function() { _notify('共有NG：個別ファイル通信エラー'); if (callback) callback(false); };
    putXhr.send(JSON.stringify(body));
  }

  attempt(3);

// ===== オフライン対応：GitHub共有の未送信分をキューで管理 =====
// 索引更新＋個別ファイル保存の2つをまとめて1件分実行し、両方成功したときだけ「同期済み」にする
var PENDING_KEY = 'meas_pending_sync';

function _loadPending() {
  try {
    var raw = localStorage.getItem(PENDING_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function _savePending(arr) {
  try { localStorage.setItem(PENDING_KEY, JSON.stringify(arr)); } catch(e) {}
}

// 同じ記録（date+memoで同定）が既にキューにあれば上書き、無ければ追加
function _queuePendingSync(record) {
  var arr = _loadPending(), i;
  for (i = 0; i < arr.length; i++) {
    if (arr[i].date === record.date && arr[i].memo === record.memo) { arr[i] = record; _savePending(arr); return; }
  }
  arr.push(record);
  _savePending(arr);
}

function _removePending(record) {
  var arr = _loadPending(), i;
  for (i = 0; i < arr.length; i++) {
    if (arr[i].date === record.date && arr[i].memo === record.memo) { arr.splice(i, 1); break; }
  }
  _savePending(arr);
}

// ローカル履歴側のpendingSyncフラグとrecordFileを更新
function _markSynced(record) {
  var arr = _loadHistory(), i;
  for (i = 0; i < arr.length; i++) {
    if (arr[i].date === record.date && arr[i].memo === record.memo) {
      arr[i].pendingSync = false;
      arr[i].recordFile  = record.recordFile;
      break;
    }
  }
  _saveHistory(arr);
}

// 1件分：索引ファイル更新→個別ファイル保存　の順で実行し、両方成功したかをcallback(ok)で返す
function _syncOneRecord(record, callback) {
  _resolveRecordFilename(record.kiban, record.status, function(filename) {
    record.recordFile = 'records/' + record.kiban + '/' + filename;
    _syncNewRecord(record, function(indexOk) {
      _putRecordFile(record, filename, function(fileOk) {
        var ok = !!(indexOk && fileOk);
        if (ok) _markSynced(record);
        if (callback) callback(ok);
      });
    });
  });
}

// オンライン復帰時などにキューの未送信分をまとめて送る（1件ずつ順番に）
function _flushPendingSync(onDone) {
  if (!navigator.onLine) { if (onDone) onDone(); return; }
  if (!_getMeasPat()) { if (onDone) onDone(); return; }
  var queue = _loadPending();
  if (!queue.length) { if (onDone) onDone(); return; }
  _notify('未同期分(' + queue.length + '件)を送信中...');
  function next(list) {
    if (!list.length) { _renderSidebar(); if (onDone) onDone(); return; }
    var rec = list.shift();
    _syncOneRecord(rec, function(ok) {
      if (ok) _removePending(rec);
      next(list);
    });
  }
  next(queue.slice());
}

// 端末上でログを削除したとき、対応する個別ファイルもGitHub側から削除する。
// recordFile未設定の古い履歴（この機能を入れる前に保存した分）は対象外。
function _deleteRecordFile(path) {
  var pat = _getMeasPat();
  if (!pat) { _notify('個別ファイル削除NG：PAT未設定'); return; }
  var url = MEAS_API_BASE + '/repos/' + MEAS_REPO_OWNER + '/' + MEAS_REPO_NAME
          + '/contents/' + path.split('/').map(encodeURIComponent).join('/');

  var getXhr = new XMLHttpRequest();
  getXhr.open('GET', url + '?t=' + Date.now(), true);
  getXhr.setRequestHeader('Authorization', 'Bearer ' + pat);
  getXhr.setRequestHeader('Accept', 'application/vnd.github+json');
  getXhr.onreadystatechange = function() {
    if (getXhr.readyState !== 4) return;
    if (getXhr.status === 404) {
      _notify('個別ファイル削除：GitHub側に見当たりませんでした（' + path + '）');
      return;
    }
    if (getXhr.status !== 200) {
      _notify('個別ファイル削除NG：sha取得失敗（status:' + getXhr.status + '）');
      return;
    }
    var sha;
    try { sha = JSON.parse(getXhr.responseText).sha; } catch(e) {}
    if (!sha) { _notify('個別ファイル削除NG：sha取得できず'); return; }

    var body = { message: '測定記録削除：' + path, sha: sha, branch: 'main' };
    var delXhr = new XMLHttpRequest();
    delXhr.open('DELETE', url, true);
    delXhr.setRequestHeader('Authorization', 'Bearer ' + pat);
    delXhr.setRequestHeader('Accept', 'application/vnd.github+json');
    delXhr.setRequestHeader('Content-Type', 'application/json');
    delXhr.onreadystatechange = function() {
      if (delXhr.readyState !== 4) return;
      if (delXhr.status === 200 || delXhr.status === 204) {
        _notify('共有OK：個別ファイルも削除しました（' + path + '）');
      } else {
        _notify('共有NG：個別ファイル削除失敗（status:' + delXhr.status + '）');
      }
    };
    delXhr.onerror = function() { _notify('共有NG：個別ファイル削除の通信エラー'); };
    delXhr.send(JSON.stringify(body));
  };
  getXhr.onerror = function() { _notify('個別ファイル削除NG：sha取得の通信エラー'); };
  getXhr.send();
}

function _fetchGist(callback) {
  // 索引ファイルは書き込みと同じ経路（Worker中継→GitHub API）で読む。
  // 以前は同一オリジンの相対パス（GitHub Pages経由）で読んでいたが、
  // Pagesのビルド反映待ち・CDNキャッシュのせいで他端末が書いた更新がすぐ見えない
  // ことがあった（PCで保存してもiPadの一覧に出てこない不具合の原因）。
  // Worker中継は既にiPad2でも通ることを確認済みなので、書き込み側と統一する。
  var apiUrl = MEAS_API_BASE + '/repos/' + MEAS_REPO_OWNER + '/' + MEAS_REPO_NAME + '/contents/' + MEAS_REPO_PATH;
  var pat = _getMeasPat();
  var xhr = new XMLHttpRequest();
  xhr.open('GET', apiUrl + '?t=' + Date.now(), true);
  xhr.setRequestHeader('Accept', 'application/vnd.github+json');
  if (pat) xhr.setRequestHeader('Authorization', 'Bearer ' + pat);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status !== 200) {
      _notify('索引取得失敗（status:' + xhr.status + '）');
      return;
    }
    try {
      var meta   = JSON.parse(xhr.responseText);
      var remote = JSON.parse(_b64DecodeUtf8(meta.content));
      if (!Array.isArray(remote)) {
        _notify('索引取得：形式が配列じゃない');
        return;
      }
      // 基本は共有索引ファイル（リモート）を正として採用する。以前はローカル全体を
      // 足していたため、他端末で削除した記録がこの端末のキャッシュにだけ残り続けて
      // 一覧から消えない不具合があった。ただしローカル全体ではなく「まだ送信し切れて
      // いない未送信キューの分」だけは例外として前に足す。これをやらないと、オフライン
      // 保存直後にLOGを開いたとき、送信(_flushPendingSync)がまだ終わっていない隙間で
      // リモートにまだ無いオフライン保存分が一覧から消えてしまう（消失バグの本体）。
      // 未送信キューはこの端末が自分で保存してまだ確定送信できていない分だけなので、
      // 他端末で削除された記録を復活させる心配はない。
      var pending = _loadPending();
      var all = pending.concat(remote);
      var seen = {}, merged = [], j, kk;
      for (j = 0; j < all.length; j++) {
        kk = all[j].date + '|' + all[j].memo;
        if (!seen[kk]) { seen[kk] = true; merged.push(all[j]); }
      }
      merged.sort(function(a, b) { return b.date < a.date ? -1 : 1; });
      if (merged.length > 50) merged = merged.slice(0, 50);
      _saveHistory(merged);
      _notify('共有OK：最新の索引を取得（件数 ' + merged.length + '）');
      if (callback) callback();
    } catch(e) {
      _notify('索引取得：解析エラー ' + e.message);
    }
  };
  xhr.onerror = function() {
    _notify('索引取得：通信エラー（オフライン？）');
  };
  xhr.send();
}

// ===== 保存パネル（テンキー横取りモード） =====
var _pendingData  = null;
var _saveMode     = false;   // テンキーを機番入力に横取り中
var _saveRaw      = '';      // 機番の生文字列
var _saveStatus   = '完成時'; // 選択中の状態
var _setupMode    = false;   // 起動時セットアップでテンキー横取り中
var _setupDone    = false;   // 機番・ステータス確定済み（測定解禁）

// ===== 測定ヘッダー更新 =====
function _setMhCur(t)  { var el = document.getElementById('mhCur');  if (el) el.textContent = t; }
function _setMhPrev(t) { var el = document.getElementById('mhPrev'); if (el) el.textContent = t; }
function _edaLabel(file, status) {
  if (file === status + '.json') return '枝番なし';
  var m = file.match(/_(\d+)\.json$/);
  return m ? ('枝番' + m[1]) : '';
}
function _stripMaru(v) { return String(v == null ? '' : v).replace(/^〇+/, ''); }
function _prevSpanVal(ph, row, col) {
  var el = document.getElementById('p_m' + ph + '_' + row + '_' + col);
  return el ? (el.textContent || '') : '';
}

// ===== 前回値（前段ステータス）の参照表示 =====
function _prevSpanIds() {
  var out = [], ph = ['u','v','w'], row = ['on','off'], col = ['b','a','r'], i, j, k;
  for (i = 0; i < ph.length; i++)
    for (j = 0; j < row.length; j++)
      for (k = 0; k < col.length; k++)
        out.push('p_m' + ph[i] + '_' + row[j] + '_' + col[k]);
  return out;
}

function _clearPrevValues() {
  var ids = _prevSpanIds(), i, el;
  for (i = 0; i < ids.length; i++) { el = document.getElementById(ids[i]); if (el) el.textContent = ''; }
}

// 機番フォルダ内の全記録から、日時(date)が最も新しい1件を前回値として表示（ステータス問わず常に最新）
function loadPrevValues(kiban) {
  _clearPrevValues();

  // まずローカル履歴（LOGを開いたとき／自分で保存したときに meas_history へ残る分）から表示。
  // これでオフライン・PAT未設定でも前回値と〇引き継ぎが使える。
  var local = _localNewest(kiban);
  if (local) { _fillPrev(local.rec, _fileFromRec(local.rec), 'ローカル'); }
  else       { _setMhPrev('前回値: 記録なし'); }

  var pat = _getMeasPat();
  if (!pat || !navigator.onLine) return;   // オフライン／PAT未設定ならローカルのみで確定

  // オンライン＆PATありなら共有(GitHub)の最新も見て、ローカルより新しければ差し替える
  var localDate = local ? local.date : '';
  var dirUrl = MEAS_API_BASE + '/repos/' + MEAS_REPO_OWNER + '/' + MEAS_REPO_NAME
             + '/contents/records/' + encodeURIComponent(kiban);
  var listXhr = new XMLHttpRequest();
  listXhr.open('GET', dirUrl + '?t=' + Date.now(), true);
  listXhr.setRequestHeader('Authorization', 'Bearer ' + pat);
  listXhr.setRequestHeader('Accept', 'application/vnd.github+json');
  listXhr.onreadystatechange = function() {
    if (listXhr.readyState !== 4) return;
    if (listXhr.status !== 200) return;      // 記録フォルダ無し等はローカル表示のまま
    var files = [];
    try { var p = JSON.parse(listXhr.responseText); if (Array.isArray(p)) files = p; } catch(e) { return; }
    var jsons = [], i;
    for (i = 0; i < files.length; i++) {
      if (files[i].name && /\.json$/.test(files[i].name)) jsons.push(files[i].name);
    }
    if (!jsons.length) return;

    var remaining = jsons.length, newest = null;
    function done() {
      if (remaining !== 0) return;
      if (newest && newest.date > localDate) { _fillPrev(newest.rec, newest.file, '共有'); }
    }
    for (i = 0; i < jsons.length; i++) {
      (function(fname) {
        var url = dirUrl + '/' + encodeURIComponent(fname);
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url + '?t=' + Date.now(), true);
        xhr.setRequestHeader('Authorization', 'Bearer ' + pat);
        xhr.setRequestHeader('Accept', 'application/vnd.github+json');
        xhr.onreadystatechange = function() {
          if (xhr.readyState !== 4) return;
          if (xhr.status === 200) {
            try {
              var meta = JSON.parse(xhr.responseText);
              var rec  = JSON.parse(_b64DecodeUtf8(meta.content));
              var d    = String(rec.date || '');
              if (!newest || d > newest.date) { newest = { date: d, rec: rec, file: fname }; }
            } catch(e) {}
          }
          remaining--; done();
        };
        xhr.onerror = function() { remaining--; done(); };
        xhr.send();
      })(jsons[i]);
    }
  };
  listXhr.onerror = function() {};
  listXhr.send();
}

// ローカル履歴(meas_history)から、その機番で日時が最新の1件を返す
function _localNewest(kiban) {
  var arr = _loadHistory(), best = null, i, r, d;
  for (i = 0; i < arr.length; i++) {
    r = arr[i];
    if (!r || String(r.kiban) !== String(kiban)) continue;
    d = String(r.date || '');
    if (!best || d > best.date) best = { date: d, rec: r };
  }
  return best;
}

// 履歴レコードの recordFile ('records/機番/完成時_2.json') からファイル名だけ取り出す
function _fileFromRec(rec) {
  var rf = (rec && rec.recordFile) ? String(rec.recordFile) : '';
  return rf ? rf.split('/').pop() : '';
}

function _fillPrev(rec, file, sourceTag) {
  if (!rec || !rec.phases) return;
  var ph = ['u','v','w'], row = ['on','off'], col = ['b','a','r'], i, j, k, cell, v, el;
  for (i = 0; i < ph.length; i++)
    for (j = 0; j < row.length; j++)
      for (k = 0; k < col.length; k++) {
        cell = rec.phases[ph[i]] && rec.phases[ph[i]][col[k]];
        v = cell ? (row[j] === 'on' ? cell.on : cell.off) : '';
        el = document.getElementById('p_m' + ph[i] + '_' + row[j] + '_' + col[k]);
        if (el) el.textContent = (v == null ? '' : v);
      }
  var st  = rec.status || '';
  var eda = file ? _edaLabel(file, st) : '';
  var src = sourceTag ? ('［' + sourceTag + '］ ') : '';
  _setMhPrev('前回値: ' + src + st + (eda ? '（' + eda + '）' : '') + '　' + (rec.date || ''));
}

function saveMeas() {
  var ph, col, i, ci, onEl, offEl, onV, offV, diff;
  var data = { date: '', memo: '', phases: {} };

  // 保存前に大小入れ替えを確定させる（OK未確定のまま保存されても正しい並びにする）
  for (i = 0; i < PHASES.length; i++) measCalc(PHASES[i]);

  // 日時
  var now = new Date();
  var yy  = now.getFullYear();
  var mm  = ('0' + (now.getMonth() + 1)).slice(-2);
  var dd  = ('0' + now.getDate()).slice(-2);
  var hh  = ('0' + now.getHours()).slice(-2);
  var mi  = ('0' + now.getMinutes()).slice(-2);
  data.date = yy + '/' + mm + '/' + dd + ' ' + hh + ':' + mi;

  // 入力値収集
  var hasAny = false;
  for (i = 0; i < PHASES.length; i++) {
    ph = PHASES[i];
    data.phases[ph] = {};
    for (ci = 0; ci < COLS.length; ci++) {
      col   = COLS[ci];
      onEl  = document.getElementById('m' + ph + '_on_'  + col);
      offEl = document.getElementById('m' + ph + '_off_' + col);
      onV   = onEl  ? onEl.value  : '';
      offV  = offEl ? offEl.value : '';
      // 空欄は前回値を引き継ぎ、未変動の印として先頭に〇を付ける
      var onPrev  = _prevSpanVal(ph, 'on',  col);
      var offPrev = _prevSpanVal(ph, 'off', col);
      if (onV  === '' && onPrev  !== '') onV  = '〇' + _stripMaru(onPrev);
      if (offV === '' && offPrev !== '') offV = '〇' + _stripMaru(offPrev);
      diff  = '';
      var onN  = parseFloat(_stripMaru(onV));
      var offN = parseFloat(_stripMaru(offV));
      if (onV !== '' && offV !== '' && !isNaN(onN) && !isNaN(offN)) {
        // 大きい値－小さい値＝差数（〇の前回値も数値化して計算）
        diff = (Math.round(Math.abs(onN - offN) * 1000) / 1000).toFixed(2);
        hasAny = true;
      }
      data.phases[ph][col] = { on: onV, off: offV, diff: diff };
    }
  }

  if (!hasAny) { showToast('入力がありません'); return; }
  if (!_setupDone) { showToast('先に機番・ステータスを入力してください'); return; }

  _pendingData = data;
  // 機番・ステータスは起動時セットアップの値を引き継ぐ（この場で選び直しも可）
  _saveMode    = true;

  // 測定欄のハイライトを外す
  if (_padTarget) {
    _padTarget.className = _padTarget.className.replace(' active-inp','').replace('active-inp','');
    _padTarget = null;
  }

  // val-bar のラベルを書き換え
  document.getElementById('padLabel').textContent = '機番（変更可）';

  // パネル表示・現在の機番／状態を反映（起動時に入れた値を初期表示）
  _refreshSaveStatus();
  _refreshSaveKiban();
  document.getElementById('savePanel').className = 'save-panel show';
}

function _refreshSaveKiban() {
  var v = _saveRaw || '—';
  document.getElementById('saveKibanVal').textContent = v;
  document.getElementById('padVal').textContent       = v;
}

function _refreshSaveStatus() {
  var btns = document.getElementById('saveStatusRow').getElementsByTagName('button');
  var k;
  for (k = 0; k < btns.length; k++) {
    if (btns[k].getAttribute('data-status') === _saveStatus) {
      btns[k].className = 'save-status-btn sel';
    } else {
      btns[k].className = 'save-status-btn';
    }
  }
}

// テンキーから横取りして呼ばれる
function _savePadKey(key) {
  if (key === 'BS') {
    if (_saveRaw.length > 0) _saveRaw = _saveRaw.slice(0, -1);
  } else if (key === 'OK') {
    confirmSave();
    return;
  } else {
    if (_saveRaw.length < 8) _saveRaw += key;
  }
  _refreshSaveKiban();
}

// テキストファイルからPATを読み込んでそのまま保存
function loadPatFromFile(fileInput) {
  var f = fileInput.files && fileInput.files[0];
  if (!f) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var v = String(e.target.result || '').trim();
    document.getElementById('optPatInput').value = v;
    if (v) {
      _setMeasPat(v);
      showToast('PATを読み込んで保存しました');
    } else {
      showToast('ファイルが空です');
    }
  };
  reader.onerror = function() { showToast('読み込みに失敗しました'); };
  reader.readAsText(f);
  fileInput.value = '';
}

function confirmSave() {
  if (!_pendingData) return;
  if (_saveRaw === '') { showToast('機番を入力してください'); return; }

  _pendingData.memo   = '機番 ' + _saveRaw + '　' + _saveStatus;
  _pendingData.kiban  = _saveRaw;
  _pendingData.status = _saveStatus;
  _pendingData.pendingSync = true; // GitHub共有が終わるまで「未同期」表示にする

  var arr = _loadHistory();
  arr.unshift(_pendingData);
  if (arr.length > 50) arr = arr.slice(0, 50);
  _saveHistory(arr);       // 即時のローカル反映（オフラインでも一覧に出るように）
  // ※closeSaveDialog()が_pendingDataをnullにするので、先にローカル変数へ退避しておく
  var recordToSave = _pendingData;

  // 端末に実ファイルとしてJSON保存（localStorageとは別に、消えない記録として残す）
  var dlName = '測定_' + recordToSave.kiban + '_' + recordToSave.status + '_'
             + recordToSave.date.replace(/[\/: ]/g, '') + '.json';
  _downloadJson(dlName, recordToSave);

  // GitHub共有はオンライン時だけ試す。オフライン／PAT未設定ならキューに積んでおいて
  // オンライン復帰時に自動で送る（_flushPendingSync）。
  if (navigator.onLine && _getMeasPat()) {
    _syncOneRecord(recordToSave, function(ok) {
      if (!ok) { _queuePendingSync(recordToSave); _renderSidebar(); }
    });
  } else {
    _queuePendingSync(recordToSave);
    _notify(navigator.onLine ? '共有NG：PAT未設定（あとで同期するにはPATを設定して）' : 'オフライン保存：オンライン復帰時に自動で共有します');
  }

  _updateKibanBadge();
  closeSaveDialog();
  showToast('保存しました');
  _renderSidebar();
}

// 履歴画面 ON/OFF
function toggleHist() {
  _histMode = !_histMode;
  var mv   = document.getElementById('histView');
  var main = document.getElementsByTagName('main')[0];
  var np   = document.getElementsByClassName('numpad')[0];
  var btn  = document.getElementById('histBtn');
  if (_histMode) {
    closeOptionPanel(); // オプション展開中にLOGへ移行したら閉じる
    main.style.display = 'none';
    np.style.display   = 'none';
    mv.className       = 'hist-view';
    btn.classList.add('active');
    _selKiban = null;
    _renderSidebar();  // まず手元の記録をすぐ表示（オフラインでもここまでは出る）
    if (navigator.onLine) {
      // 送信(flush)と索引取得(fetch)を同時に走らせると、送信完了前に返ってきた
      // fetchがリモート索引でローカルを上書きし、オフライン保存分が一覧から消える。
      // 送信を先に完了させてから取得する（＋fetch側でも未送信キューを足す二段構え）。
      _flushPendingSync(function() {
        _fetchGist(function() { _renderSidebar(); });
      });
    } else {
      _notify('オフライン：手元の記録を表示中です');
    }
  } else {
    mv.className       = 'hist-view hidden';
    main.style.display = '';
    np.style.display   = '';
    btn.classList.remove('active');
  }
}

// サイドバー描画（機番ごとにまとめて1行。左は機番のみ表示）
function _renderSidebar() {
  var arr  = _loadHistory();
  var list = document.getElementById('histList');
  if (arr.length === 0) {
    list.innerHTML = '<div class="hist-empty">保存データなし</div>';
    return;
  }
  // 機番ごとにまとめる。arrは日付降順なので初出順＝新しい機番順で並ぶ。
  // ひとつでも未同期の記録があれば、その機番に「未同期」バッジを付ける。
  var order = [], seen = {}, pend = {}, i, kb;
  for (i = 0; i < arr.length; i++) {
    kb = arr[i].kiban || '未入力';
    if (!seen[kb]) { seen[kb] = true; order.push(kb); pend[kb] = false; }
    if (arr[i].pendingSync) pend[kb] = true;
  }
  var html = '';
  for (i = 0; i < order.length; i++) {
    kb = order[i];
    html += '<div class="hist-item' + (kb === _selKiban ? ' selected' : '') + '">'
          + (pend[kb] ? '<span class="hist-pending">未同期</span>' : '')
          + '<div class="hist-item-kiban">機番 ' + _esc(kb) + '</div>'
          + '</div>';
  }
  list.innerHTML = html;

  // 機番タップ → その機番の詳細を表示（ontouchend + onclick フォールバック）
  var items = list.getElementsByClassName('hist-item');
  var k;
  for (k = 0; k < items.length; k++) {
    (function(kban) {
      items[k].ontouchend = function(e) { e.preventDefault(); _selKiban = kban; _renderSidebar(); _renderDetail(kban); };
      items[k].onclick    = function()  { _selKiban = kban; _renderSidebar(); _renderDetail(kban); };
    })(order[k]);
  }

  // 選択中の機番があれば詳細を維持
  if (_selKiban != null && seen[_selKiban]) _renderDetail(_selKiban);
}

// 1件分の記録を削除（詳細画面の各ステータス毎の×から呼ぶ）。
// 記録の同定は date+memo で行う（配列インデックスは再描画でズレるため使わない）。
function _deleteRecord(rec, kiban) {
  if (!confirm('この記録（機番 ' + (rec.kiban || '') + '・' + (rec.status || '') + '）を削除しますか？')) return;
  var arr = _loadHistory(), i, removed = null;
  for (i = 0; i < arr.length; i++) {
    if (arr[i].date === rec.date && arr[i].memo === rec.memo) { removed = arr[i]; arr.splice(i, 1); break; }
  }
  _saveHistory(arr);
  _pushHistoryIndex(arr);            // 削除は最終形が確定済みなので索引ファイルへそのまま上書き
  if (removed && removed.recordFile) _deleteRecordFile(removed.recordFile); // 個別ファイルもGitHub側から削除
  _removePending(rec);               // 未送信キューに残っていれば消す（復活防止）

  _renderSidebar();
  // 同じ機番の記録がまだ残っていれば詳細を再描画、無ければ詳細を空にする
  var still = false;
  for (i = 0; i < arr.length; i++) {
    if ((arr[i].kiban || '未入力') === kiban) { still = true; break; }
  }
  if (still) {
    _renderDetail(kiban);
  } else {
    _selKiban = null;
    document.getElementById('histDetail').innerHTML = '<div class="hist-detail-empty">←機番を選択</div>';
  }
}

// 詳細エリア描画：選択機番の各ステータスを縦に並べて表示
function _renderDetail(kiban) {
  var arr = _loadHistory();
  var recs = [], i;
  for (i = 0; i < arr.length; i++) {
    if ((arr[i].kiban || '未入力') === kiban) recs.push(arr[i]);
  }
  var detail = document.getElementById('histDetail');
  if (!recs.length) {
    detail.innerHTML = '<div class="hist-detail-empty">←機番を選択</div>';
    return;
  }
  var phNames = { u:'U相', v:'V相', w:'W相' };
  var phColors= { u:'hr-ph-u', v:'hr-ph-v', w:'hr-ph-w' };
  var html = '<div class="hist-detail-memo">機番 ' + _esc(kiban) + '</div>';

  var r, si, ph, col, ci, row, dv, cls, pi, ri, dNum, rows2;
  for (si = 0; si < recs.length; si++) {
    r = recs[si];
    html += '<div class="hist-rec">';
    html += '<div class="hist-rec-hd">'
          +   '<span class="hist-rec-status">' + _esc(r.status || '（状態なし）') + '</span>'
          +   (r.pendingSync ? '<span class="hist-rec-pend">未同期</span>' : '')
          +   '<span class="hist-rec-date">' + _esc(r.date) + '</span>'
          +   '<button class="hist-rec-del">×</button>'
          + '</div>';
    for (pi = 0; pi < PHASES.length; pi++) {
      ph = PHASES[pi];
      html += '<div class="hr-ph-hd ' + phColors[ph] + '">' + phNames[ph] + '</div>';
      html += '<table class="hr-tbl"><thead><tr>'
            + '<th style="width:20%"></th><th>B</th><th>A</th><th>R</th>'
            + '</tr></thead><tbody>';
      rows2 = [['','on'],['','off'],['差数','diff']];
      for (ri = 0; ri < rows2.length; ri++) {
        row = rows2[ri];
        html += '<tr><td class="lbl">' + row[0] + '</td>';
        for (ci = 0; ci < COLS.length; ci++) {
          col = COLS[ci];
          dv  = r.phases && r.phases[ph] && r.phases[ph][col] ? r.phases[ph][col][row[1]] : '';
          if (row[1] === 'diff' && dv !== '') {
            dNum = parseFloat(dv);
            cls = dNum >= 1.83 && dNum <= 1.97 ? 'diff-ok'
                : dNum >= 1.80 && dNum <= 2.00 ? 'diff-warn'
                : 'diff-ng';
            html += '<td class="' + cls + '">' + _esc(dv) + '</td>';
          } else {
            html += '<td>' + _esc(dv || '—') + '</td>';
          }
        }
        html += '</tr>';
      }
      html += '</tbody></table>';
    }
    html += '</div>';
  }

  detail.innerHTML = html;

  // 各ステータスの×削除（合成clickの二重発火は _delTouchAt でガード。
  // 起点時刻は confirm 終了後に取り直す＝ログ削除バグと同じ対策）
  var dels = detail.getElementsByClassName('hist-rec-del');
  var k;
  for (k = 0; k < dels.length; k++) {
    (function(rec) {
      dels[k].ontouchend = function(e) {
        e.preventDefault(); e.stopPropagation();
        _deleteRecord(rec, kiban);
        _delTouchAt = Date.now();
      };
      dels[k].onclick = function(e) {
        e.stopPropagation();
        if (Date.now() - _delTouchAt < 1500) return;
        _deleteRecord(rec, kiban);
      };
    })(recs[k]);
  }
}

function _esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== SW登録 =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('meas_sw.js').catch(function() {});
}

// ===== オンライン復帰時に未同期分を自動送信 =====
window.addEventListener('online', function() {
  _notify('オンラインになったです');
  _flushPendingSync();
});
if (navigator.onLine) { _flushPendingSync(); } // 起動時点で繋がっていれば溜まってる分を送る

// ===== 初期化 =====
window.onload = function() {
  var i, allInputs, btns, grid;

  // ① 入力欄を起動時にキャッシュ（meas-in クラスのみ）
  allInputs = document.getElementsByTagName('input');
  for (i = 0; i < allInputs.length; i++) {
    if (allInputs[i].getAttribute('data-ph')) {
      _inputs.push(allInputs[i]);
    }
  }

  // ② 入力欄タップ → ontouchend で300ms遅延解消
  for (i = 0; i < _inputs.length; i++) {
    _inputs[i].ontouchend = (function(inp) {
      return function(e) { e.preventDefault(); focusInp(inp); };
    })(_inputs[i]);
    // PC/マウス用フォールバック
    _inputs[i].onclick = (function(inp) {
      return function() { focusInp(inp); };
    })(_inputs[i]);
    // 物理キーボードのTabで欄移動した場合もフォーカス欄を同期
    _inputs[i].onfocus = (function(inp) {
      return function() { focusInp(inp); };
    })(_inputs[i]);
  }

  // ×ボタン → 1.5秒長押しで削除（誤タップ防止）
  btns = document.getElementsByTagName('button');
  for (i = 0; i < btns.length; i++) {
    if (btns[i].getAttribute('data-clear')) {
      (function(btn) {
        var id = btn.getAttribute('data-clear');
        var ph = btn.getAttribute('data-ph');
        var holdTimer = null;
        function startHold(e) {
          e.preventDefault();
          if (holdTimer) clearTimeout(holdTimer);
          holdTimer = setTimeout(function() {
            holdTimer = null;
            clearOne(id, ph);
          }, 1500);
        }
        function cancelHold(e) {
          if (e) e.preventDefault();
          if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
        }
        btn.ontouchstart  = startHold;
        btn.ontouchend    = cancelHold;
        btn.ontouchcancel = cancelHold;
        btn.onmousedown   = startHold;
        btn.onmouseup     = cancelHold;
        btn.onmouseleave  = cancelHold;
        btn.onclick       = function(e) { e.preventDefault(); };
      })(btns[i]);
    }
    // CLRボタン → 1.5秒長押しで列クリア（誤タップ防止）
    if (btns[i].getAttribute('data-colclear')) {
      (function(btn) {
        var col = btn.getAttribute('data-colclear');
        var ph  = btn.getAttribute('data-ph');
        var holdTimer = null;
        function startHold(e) {
          e.preventDefault();
          if (holdTimer) clearTimeout(holdTimer);
          holdTimer = setTimeout(function() {
            holdTimer = null;
            clearCol(ph, col);
          }, 1500);
        }
        function cancelHold(e) {
          if (e) e.preventDefault();
          if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
        }
        btn.ontouchstart  = startHold;
        btn.ontouchend    = cancelHold;
        btn.ontouchcancel = cancelHold;
        btn.onmousedown   = startHold;
        btn.onmouseup     = cancelHold;
        btn.onmouseleave  = cancelHold;
        btn.onclick       = function(e) { e.preventDefault(); };
      })(btns[i]);
    }
  }

  // ② テンキー：ontouchend でイベント委譲（300ms遅延解消）
  grid = document.getElementById('numpadGrid');
  grid.ontouchend = function(e) {
    var b = e.target;
    if (b.tagName === 'BUTTON') {
      e.preventDefault();
      _npTap(b.getAttribute('data-key'));
    }
  };
  // PC/マウス用フォールバック
  grid.onclick = function(e) {
    var b = e.target;
    if (b.tagName === 'BUTTON') _npTap(b.getAttribute('data-key'));
  };

  // 状態選択ボタン（委譲）
  var srow = document.getElementById('saveStatusRow');
  srow.ontouchend = function(e) {
    var b = e.target;
    if (b.tagName === 'BUTTON') {
      e.preventDefault();
      _saveStatus = b.getAttribute('data-status');
      _refreshSaveStatus();
    }
  };
  srow.onclick = function(e) {
    var b = e.target;
    if (b.tagName === 'BUTTON') {
      _saveStatus = b.getAttribute('data-status');
      _refreshSaveStatus();
    }
  };

  // 起動時セットアップの状態選択ボタン（委譲）
  var strow = document.getElementById('setupStatusRow');
  strow.ontouchend = function(e) {
    var b = e.target;
    if (b.tagName === 'BUTTON') {
      e.preventDefault();
      _saveStatus = b.getAttribute('data-status');
      _refreshSetupStatus();
    }
  };
  strow.onclick = function(e) {
    var b = e.target;
    if (b.tagName === 'BUTTON') {
      _saveStatus = b.getAttribute('data-status');
      _refreshSetupStatus();
    }
  };

  // 起動時：機番・ステータス入力を必須で表示
  openSetup();
};
</script>
